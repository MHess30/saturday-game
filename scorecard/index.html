    CREATE TABLE saturday_bets_users (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT UNIQUE NOT NULL,
        pin_hash TEXT NOT NULL,
        email TEXT,
        is_admin BOOLEAN DEFAULT false
    );

    ALTER TABLE saturday_bets_users ENABLE ROW LEVEL SECURITY;

    -- Users: anyone can read & create accounts
    CREATE POLICY "Allow select for anon" ON saturday_bets_users
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_users
        FOR INSERT WITH CHECK (true);
    -- Only the user themselves (or admin) can update their own row
    CREATE POLICY "Allow update own or admin" ON saturday_bets_users
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete users
    CREATE POLICY "Admin delete only" ON saturday_bets_users
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );

    CREATE TABLE saturday_bets_rounds (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT NOT NULL,
        date DATE NOT NULL,
        course TEXT DEFAULT 'El Caballero',
        tees TEXT,
        status TEXT DEFAULT 'in_progress',
        player_names TEXT[],
        total_winnings NUMERIC DEFAULT 0,
        state JSONB NOT NULL
    );

    CREATE INDEX idx_bets_user ON saturday_bets_rounds(user_name);
    CREATE INDEX idx_bets_date ON saturday_bets_rounds(date DESC);
    CREATE INDEX idx_bets_status ON saturday_bets_rounds(status);

    ALTER TABLE saturday_bets_rounds ENABLE ROW LEVEL SECURITY;

    -- Rounds: anyone can read & create
    CREATE POLICY "Allow select for anon" ON saturday_bets_rounds
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_rounds
        FOR INSERT WITH CHECK (true);
    -- Only the round owner (or admin) can update
    CREATE POLICY "Allow update own or admin" ON saturday_bets_rounds
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete rounds
    CREATE POLICY "Admin delete only" ON saturday_bets_rounds
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -->

            cursor: pointer;
            transition: all 0.3s;
            position: relative;

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--white);
            top: 3px;
            left: 2px;
            transition: left 0.3s;

        .toggle-switch.on {

                                                    <div class="team-title">Opponents</div>
                                                    <template x-for="playerIdx in segment.opponents" :key="playerIdx">
                                                        <button class="player-button team-opp" @click="togglePlayerTeam(sIdx, playerIdx)" x-text="players[playerIdx].name"></button>
                                                    </template>
                                                    <div x-show="segment.opponents.length === 0" style="font-size: 11px; color: var(--gray-400); padding: 6px;">—</div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <template x-if="segment.box.length > 0 && segment.opponents.length > 0">
                                <div class="segment-scroll-wrapper">
                                    <!-- Mini scorecard for segment (shows redistributed team strokes) -->
                                    <div class="scorecard-container segment-inner" style="margin-bottom: 8px;">
                                        <div style="padding: 6px 12px; background-color: var(--black); border-bottom: 1px solid var(--gray-200); font-size: 12px; font-weight: 700; color: var(--gold);" x-text="`Holes ${segment.startHole}-${segment.endHole} Scorecard`"></div>
                                        <table class="scorecard-table">
                                            <thead>
                                                <tr>
                                                    <th style="min-width: 70px;">Hole</th>
                                                    <template x-for="h in 6" :key="'msh'+sIdx+h">
                                                        <th x-text="segment.startHole + h - 1"></th>
                                                    </template>
                                                    <th style="background-color: var(--green-dark);">TOT</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr style="color: var(--gold);">
                                                    <td class="player-label" style="color: var(--gold);">Par</td>
                                                    <template x-for="h in 6" :key="'msp'+sIdx+h">
                                                        <td style="color: var(--gold);" x-text="holeData[segment.startHole + h - 2] ? holeData[segment.startHole + h - 2].par : ''"></td>
                                                    </template>
                                                    <td class="subtotal" x-text="(() => { let t=0; for(let i=0; i<6; i++) { const h = holeData[segment.startHole + i - 1]; if(h) t += h.par; } return t; })()"></td>
                                                </tr>
                                                <!-- Player rows -->
                                                <template x-for="(player, pi) in players.slice(0, teamPlayerCount)" :key="'mspx'+sIdx+pi">
                                                    <tr>
                                                        <td class="player-label" :style="segment.box.includes(pi) ? 'color:var(--gold)' : segment.opponents.includes(pi) ? 'color:var(--green)' : ''" x-text="player.name.split(' ')[0]"></td>
                                                        <template x-for="h in 6" :key="'msps'+sIdx+pi+h">
                                                            <td :class="{ 'has-stroke': getsTeamStroke(sIdx, pi, segment.startHole + h - 2) === 1, 'has-stroke-2': getsTeamStroke(sIdx, pi, segment.startHole + h - 2) >= 2 }" :style="`color: ${getScoreColor(segment.startHole + h - 2, pi)}`"><span :class="getScoreClass(segment.startHole + h - 2, pi)" x-text="scores[segment.startHole + h - 2] ? (scores[segment.startHole + h - 2][pi] !== null ? scores[segment.startHole + h - 2][pi] : '') : ''"></span></td>
                                                        </template>
                                                        <td class="subtotal" x-text="getGrossTotal(pi, segment.startHole - 1, segment.endHole - 1) || '–'"></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- Match results -->
                                <template x-for="(match, mIdx) in (segment.matches || [])" :key="'tm'+mIdx">
                                    <div class="scorecard-container segment-inner" style="margin-bottom: 16px;">
                                        <!-- Compact Header (Always visible, clickable to expand) -->
                                        <div style="padding: 10px 12px; background-color: var(--black); cursor: pointer; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;" @click="toggleMatchupExpand('teams', sIdx+'_'+mIdx)">
                                            <span style="color: var(--gold);" x-text="isMatchupExpanded('teams', sIdx+'_'+mIdx) ? '▼' : '▶'"></span>
                                            <div style="flex: 1; display: flex; gap: 12px; align-items: center;">
                                                <span style="font-weight: 700;"><span style="color: var(--gold);" x-text="segment.box.map(i => getInitials(players[i]?.name)).join('/')"></span><span style="color: var(--gray-400);"> vs </span><span style="color: var(--green);" x-text="match.teamB.map(i => getInitials(players[i]?.name)).join('/')"></span></span>
                                                <span style="color: var(--gray-400);" x-show="teamFormat==='nassau'" x-text="'F: '+getMatchStatus(match, 'front3')"></span>
                                                <span style="color: var(--gray-400);" x-show="teamFormat==='nassau'" x-text="'| B: '+getMatchStatus(match, 'back3')"></span>
                                                <span style="color: var(--gray-400);" x-show="teamFormat==='nassau'" x-text="'| O: '+getMatchStatus(match, 'combined')"></span>
                                                <span style="color: var(--gray-400);" x-show="teamFormat!=='nassau'" x-text="getMatchStatus(match, 'combined') + ((match.presses||[]).length>0 ? ' ('+(match.presses||[]).map((p,i)=>'P'+(i+1)+': '+(p.cum===0?'AS':(p.cum>0?'+'+p.cum:''+p.cum))).join(', ')+')' : '')"></span>
                                            </div>
                                            <span :style="(() => { const t = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0); return t > 0 ? 'color:var(--green)' : t < 0 ? 'color:var(--red)' : 'color:var(--white)'; })()" x-text="(() => { const t = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0); return formatMoney(t); })()"></span>
                                        </div>
                                        <!-- Expanded Scorecard (Hidden by default) -->
                                        <template x-if="isMatchupExpanded('teams', sIdx+'_'+mIdx)">
                                            <div>
                                            <div style="padding: 8px 12px; background-color: var(--black); border-bottom: 1px solid var(--gray-200); font-size: 13px; font-weight: 700; color: var(--gold);" x-text="`${match.label} (${teamFormat==='nassau' ? '$'+getTeamBet('front')+'/$'+getTeamBet('back')+'/$'+getTeamBet('overall') : '$'+getTeamBet('overall')})`"></div>
                                            <!-- Straight format: 6-hole table -->
                                            <template x-if="teamFormat === 'straight'">
                                        <table class="scorecard-table">
                                            <thead>
                                                <tr>
                                                    <th style="min-width: 70px;">Match</th>
                                                    <template x-for="h in 6" :key="'th'+h">
                                                        <th x-text="segment.startHole + h - 1"></th>
                                                    </template>
                                                    <th style="background-color: var(--green-dark); font-weight: 800;">$</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td class="player-label" style="font-size: 11px;" x-text="`H${segment.startHole}-${segment.endHole}`"></td>
                                                    <template x-for="h in 6" :key="'tc'+h">
                                                        <td :style="matchStatusColor(match.holeResults ? match.holeResults[segment.startHole + h - 2] : null)" x-text="formatMatchStatus(match.holeResults ? match.holeResults[segment.startHole + h - 2] : null)"></td>
                                                    </template>
                                                    <td class="subtotal" style="font-weight: 800;" :style="(match.combined ? match.combined.winnings : 0) > 0 ? 'color: var(--green)' : (match.combined ? match.combined.winnings : 0) < 0 ? 'color: var(--red)' : ''" x-text="formatMoney(match.combined ? match.combined.winnings : 0)"></td>
                                                </tr>
                                                <!-- Straight presses -->
                                                <template x-for="(press, pIdx) in (match.presses || [])" :key="'tp'+pIdx">
                                                    <tr>
                                                        <td class="player-label" style="font-size: 11px;" x-text="press.label"></td>
                                                        <template x-for="h in 6" :key="'tpa'+h">
                                                            <td :style="matchStatusColor(getTeamPressHoleStatus(sIdx, mIdx, pIdx, segment.startHole + h - 2))" x-text="formatMatchStatus(getTeamPressHoleStatus(sIdx, mIdx, pIdx, segment.startHole + h - 2))"></td>
                                                        </template>
                                                        <td class="subtotal" style="font-weight: 800;" :style="press.winnings > 0 ? 'color: var(--green)' : press.winnings < 0 ? 'color: var(--red)' : ''" x-text="formatMoney(press.winnings)"></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                        </template>
                                        <!-- Nassau format: compact 6-hole table -->
                                        <template x-if="teamFormat === 'nassau'">
                                        <table class="scorecard-table">
                                            <thead>
                                                <tr>
                                                    <th style="min-width: 70px;">Match</th>
                                                    <template x-for="h in 6" :key="'tmh'+h">
                                                        <th x-text="segment.startHole + h - 1"></th>
                                                    </template>
                                                    <th style="background-color: var(--green-dark); font-weight: 800;">$</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <!-- Front 3 (first 3 holes of segment) -->
                                                <tr>
                                                    <td class="player-label" style="font-size: 11px;">Front 3</td>
                                                    <template x-for="h in 6" :key="'tnf6'+h">
                                                        <td :style="h <= 3 ? matchStatusColor(getTeamNassauRunning(sIdx, mIdx, 'front3', segment.startHole + h - 2)) : ''" x-text="h <= 3 ? formatMatchStatus(getTeamNassauRunning(sIdx, mIdx, 'front3', segment.startHole + h - 2)) : ''"></td>
                                                    </template>
                                                    <td class="subtotal" :style="(match.front3 ? match.front3.winnings : 0) > 0 ? 'color: var(--green)' : (match.front3 ? match.front3.winnings : 0) < 0 ? 'color: var(--red)' : ''" x-text="formatMoney(match.front3 ? match.front3.winnings : 0)"></td>
                                                </tr>
                                                <!-- Back 3 (last 3 holes of segment) -->
                                                <tr>
                                                    <td class="player-label" style="font-size: 11px;">Back 3</td>
                                            }

        .segment-scroll-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px;
        }

        .segment-scroll-wrapper .segment-inner {
            overflow: visible;
            border-radius: 6px;
        }

        .segment-scroll-wrapper .scorecard-table {
            min-width: 380px;
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 680px;
            table-layout: auto;
        }

        .scorecard-table th, .scorecard-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }

        .scorecard-table th {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .scorecard-table td {
            background-color: var(--card-bg);
            color: var(--white);
        }

        .scorecard-table td.score-cell {
            font-weight: 600;
        }

        .scorecard-table .player-label {
            text-align: left;
            color: var(--gold-light);
            font-weight: 600;
            min-width: 80px;
            white-space: nowrap;
            font-size: 11px;
        }

        .scorecard-table .subtotal {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
        }

        /* NASSAU TAB */
        .nassau-matchup {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .matchup-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .nassau-result-row {
            display: grid;
            grid-template-columns: 80px 1fr 100px;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-200);
            align-items: center;
        }

        .nassau-result-row:last-child {
            border-bottom: none;
        }

        .nassau-label {
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
        }

        .nassau-status {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .nassau-status.me-up {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--green);
        }

        .nassau-status.me-down {
            background-color: rgba(231, 76, 60, 0.2);
            color: var(--red);
        }

        .nassau-status.all-square {
            background-color: rgba(138, 155, 176, 0.15);
            color: var(--gray-400);
        }

        .nassau-amount {
            font-weight: 700;
            text-align: right;
            padding: 4px 8px;
        }

        .nassau-amount.positive {
            color: var(--green);
        }

        .nassau-amount.negative {
            color: var(--red);
        }

        .press-section {
            margin-top: 8px;
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
            border: 1px dashed var(--gray-200);
        }

        .press-label {
            font-size: 11px;
            color: var(--gold-light);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .press-item {
            display: grid;
            grid-template-columns: 60px 1fr 80px;
            gap: 8px;
            font-size: 11px;
            padding: 4px 0;
            align-items: center;
        }

        .hole-detail-toggle {
            margin-top: 8px;
            padding: 8px;
            background-color: var(--black);
            border: 1px solid var(--gray-200);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
            user-select: none;
        }

        .hole-detail-grid {
            display: grid;
            grid-template-columns: 40px 60px 60px 50px;
            gap: 8px;
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
            margin-top: 6px;
            font-size: 11px;
            overflow-x: auto;
        }

        .hole-detail-header {
            font-weight: 700;
            color: var(--gold);
            text-align: center;
        }

        .hole-detail-row {
            display: contents;
        }

        .hole-detail-cell {
            padding: 4px;
            text-align: center;
            color: var(--white);
        }

        .hole-detail-hole {
            font-weight: 600;
            color: var(--gold-light);
        }

        .hole-detail-cell.win {
            color: var(--green);
            font-weight: 600;
        }

        .hole-detail-cell.loss {
            color: var(--red);
            font-weight: 600;
        }

        .hole-detail-cell.tie {
            color: var(--gray-400);
        }

        /* TEAMS TAB */
        .teams-segment {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .teams-segment-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .team-assignment {
            padding: 8px;
            background-color: var(--card-bg2);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .team-assignment-label {
            font-size: 12px;
            color: var(--gold-light);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .player-button {
            padding: 6px 10px;
            margin: 4px 4px;
            border: 1px solid var(--gray-200);
            background-color: var(--black);
            color: var(--gold-light);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .player-button.unassigned {
            background-color: var(--card-bg2);
            color: var(--gray-400);
            border-color: var(--gray-700);
        }

        .player-button.team-a {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--green);
            border-color: var(--green-dark);
        }

        .player-button.team-b {
            background-color: rgba(200, 169, 81, 0.2);
            color: var(--gold-light);
            border-color: var(--gold-dark);
        }

        .team-column {
            flex: 1;
        }

        .team-title {
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 6px;
        }

        /* POINTS TAB */
        .points-grid {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
        }

        .points-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 500px;
        }

        .points-table th, .points-table td {
            padding: 6px;
            border: 1px solid var(--gray-200);
            text-align: center;
        }

        .points-table th {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .points-table td {
            background-color: var(--card-bg);
            color: var(--white);
        }

        .points-table .hole-col {
            font-weight: 600;
            color: var(--gold-light);
        }

        .points-table .totals-row td {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
        }

        .points-cell-score {
            font-weight: 600;
        }

        .points-cell-points {
            color: var(--gold);
            font-weight: 600;
        }

        .points-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .points-summary-item {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .points-summary-label {
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .points-summary-value {
            font-size: 18px;
            font-weight: 700;
        }

        .points-summary-value.positive {
            color: var(--green);
        }

        .points-summary-value.negative {
            color: var(--red);
        }

        /* SUMMARY SCREEN */
        .summary-header {
            text-align: center;
            padding: 20px 12px;
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--green-dark);
        }

        .summary-total {
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 6px;
        }

        .summary-amount {
            font-size: 36px;
            font-weight: 800;
            margin-top: 4px;
        }

        .summary-amount.positive {
            color: var(--green);
        }

        .summary-amount.negative {
            color: var(--red);
        }

        .summary-box {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .summary-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-player-name {
            color: var(--gold-light);
            font-weight: 600;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--navy2);
            border-top: 2px solid var(--green-dark);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            flex: 1;
            height: 100%;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-icon.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        /* HOW TO PLAY MODAL */
        .htp-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 20px 12px; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .htp-modal {
            background: var(--navy2); border: 1px solid var(--green-dark); border-radius: 16px;
            width: 100%; max-width: 480px; padding: 20px 16px 24px; position: relative;
        }
        .htp-close {
            position: absolute; top: 10px; right: 14px; background: none; border: none;
            color: var(--gray-400); font-size: 22px; cursor: pointer; padding: 4px;
        }
        .htp-title {
            font-size: 18px; font-weight: 700; color: var(--gold); text-align: center;
            margin-bottom: 16px;
        }
        .htp-game {
            margin-bottom: 16px; padding: 12px; background: var(--card-bg);
            border-radius: 10px; border: 1px solid var(--gray-200);
        }
        .htp-game-title {
            font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 6px;
        }
        .htp-game p {
            font-size: 12px; color: var(--gold-light); line-height: 1.5; margin: 0 0 6px;
        }
        .htp-game p:last-child { margin-bottom: 0; }
        .htp-fab {
            position: fixed; bottom: 70px; right: 12px; z-index: 90;
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--green-dark);
            background: var(--navy2); color: var(--gold); font-size: 16px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* UTILITIES */
        .expandable {
            user-select: none;
        }

        .expandable::after {
            content: ' ▼';
            font-size: 10px;
        }

        .expandable.expanded::after {
            content: ' ▲';
        }

        .score-cell {
            position: relative;
        }

        /* Score decorations: birdie=circle, bogey=square, double+=double square */
        .score-birdie {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-bogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-dblbogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;

                    <div class="htp-title">How to Play</div>

                    <div class="htp-game">
                        <div class="htp-game-title">Indies (Head-to-Head)</div>
                        <p>Every player is matched against every other player in your group. You're betting individually against each opponent — your net score vs. theirs on each hole.</p>
                        <p><strong style="color:var(--gold);">Straight 18:</strong> One bet across all 18 holes. Whoever is ahead after 18 wins. No presses — what you see is what you get.</p>
                        <p><strong style="color:var(--gold);">18 Auto Press:</strong> Same as Straight 18 — one 18-hole match. But whenever a player goes 2 down, a press automatically starts. Press denomination is set separately from the match amount.</p>
                        <p><strong style="color:var(--gold);">Aloha:</strong> One bet across all 18 holes. If a player is mathematically closed out (e.g. 3 down with 2 to play), a new “aloha bet” starts for the remaining holes at half the original amount. Aloha bets can chain — if you get closed out on an aloha, another one starts at half again.</p>
                        <p><strong style="color:var(--gold);">Nassau:</strong> Three separate bets — Front 9, Back 9, and Overall 18. Each is its own match with its own denomination.</p>
                        <p><strong style="color:var(--gold);">Nassau Auto:</strong> Same as Nassau but with auto presses. Whenever a player goes 2 down on any of the three matches, a press kicks in automatically.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Team Game</div>
                        <p>Two-on-two (or two vs. one + a "pro" in 3-player rounds). Teams play 6-hole segments with new team combos each segment — so everyone partners with everyone.</p>
                        <p><strong style="color:var(--gold);">Best Ball (1 Ball):</strong> The lower net score between the two teammates counts each hole.</p>
                        <p><strong style="color:var(--gold);">Both Balls (2 Ball):</strong> Each player's net score counts individually — your team's low ball vs. their low ball, your team's high ball vs. their high ball. Think of it like a high/low match within each hole.</p>
                        <p><strong style="color:var(--gold);">Straight Six:</strong> One bet per 6-hole segment. The team ahead after the segment wins.</p>
                        <p><strong style="color:var(--gold);">Nassau:</strong> Front 3, Back 3, and Overall 6 within each segment — three separate bets per segment.</p>
                        <p><strong style="color:var(--gold);">Auto Presses:</strong> In all team formats, a press starts automatically when a team goes 2 down. In Both Balls formats, both balls are settled before a press can trigger — so if you're down 1 and lose both balls on the same hole, you jump to 3 down. The press triggered at 2 down, so you start the next hole 3 down on the original bet and even (AS) on the press. No mid-hole press starts.</p>
                        <p>The "Pro" option (3-player only) adds a phantom scratch player who shoots par every hole, giving you a full 2v2.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Points Game</div>
                        <p>Every hole, each player earns points based on where their net score ranks in the group. Ties split the combined points evenly.</p>
                        <p><strong style="color:var(--gold);">3 Players</strong> — 9 pts per hole: Win 5 / Place 3 / Show 1</p>
                        <p><strong style="color:var(--gold);">4 Players</strong> — 16 pts per hole: Win 7 / Place 5 / Show 3 / Last 1</p>
                        <p><strong style="color:var(--gold);">5 Players</strong> — 25 pts per hole: Win 9 / Place 7 / Show 5 / 4th 3 / Last 1</p>
                        <p><strong style="color:var(--gold);">Sweep:</strong> If you win a hole by 2 or more net shots, you sweep — you take ALL the points for that hole (9, 16, or 25 depending on group size). Sweeps are where the big swings happen.</p>
                        <p>After 18, each point above or below the break-even line is worth the per-point dollar amount.</p>
                    </div>

                async doLogin() {
                    const name = this.loginName.trim();

                    if (!/^\d{4}$/.test(pin)) { this.loginError = 'PIN must be 4 digits'; return; }

                    this.loginLoading = true;
                    try {

                            const { data: players } = await sb.from('players')

                            if (!player) {
                                this.loginError = 'Name not found. Check spelling.';
                                this.loginLoading = false;
                                return;
                            }

                            this.isAdmin = (userRole === 'admin' || userRole === 'super_admin');
                            this.userRole = userRole;

                    rounds.forEach(round => {
                        if (round.player_names && Array.isArray(round.player_names)) {
                            round.player_names.forEach(name => { if (name) players.add(name); });
                        } else if (round.state && round.state.players) {
                            round.state.players.forEach(p => { if (p && p.name) players.add(p.name); });
                        }
                    });
                    // Also include users from adminData.users

                computePlayerStats() {
                    if (!this.adminSelectedPlayer || this.adminRounds.length === 0) {
                        this.adminPlayerStats = null;
                        return;
                    }
                    const playerName = this.adminSelectedPlayer;
                    const playerRounds = this.adminRounds.filter(r =>
                        r.player_names && Array.isArray(r.player_names) &&
                        r.player_names.some(p => p.toLowerCase() === playerName.toLowerCase())
                    );

                    let lifetimePL = 0;
                    let nassauCount = 0, teamCount = 0, pointsCount = 0;
                    const partners = {};

                    playerRounds.forEach(round => {
                        // Calculate P/L from state if available
                        if (round.state && round.state.pointsMoneyTotals && round.state.players) {
                            const playerIdx = round.state.players.findIndex(p =>
                                p.name.toLowerCase() === playerName.toLowerCase()
                            );
                            if (playerIdx >= 0 && round.state.pointsMoneyTotals[playerIdx] !== undefined) {
                                lifetimePL += round.state.pointsMoneyTotals[playerIdx];
                            }
                        }

                        // Count games
                        if (round.state && round.state.games) {
                            if (round.state.games.nassau) nassauCount++;
                            if (round.state.games.team) teamCount++;
                            if (round.state.games.points) pointsCount++;
                        }

                        // Count partners
                        if (round.player_names && Array.isArray(round.player_names)) {
                            round.player_names.forEach(name => {
                                if (name.toLowerCase() !== playerName.toLowerCase()) {
                                    partners[name] = (partners[name] || 0) + 1;
                                }
                            });
                        }
                    });

                    const partnerList = Object.entries(partners)
                        .map(([name, count]) => ({ name, count }))
                        .sort((a, b) => b.count - a.count);

                    this.adminPlayerStats = {
                        totalRounds: playerRounds.length,
                        lifetimePL,
                        nassauCount,
                        teamCount,
                        pointsCount,
                        partners: partnerList
                    };
                },

                            }).join(',')
                        )
                    ].join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                computeAllUserStats() {
                    const stats = {};
                    this.adminData.users.forEach(user => {
                        stats[user.user_name] = {
                            roundsPlayed: 0,
                            lifetimePL: 0,
                            nassauCount: 0,
                            teamCount: 0,
                            pointsCount: 0,
                            partners: []
                        };
                    });

                    const userPartners = {};
                    this.adminData.rounds.forEach(round => {
                        if (!round.player_names || !Array.isArray(round.player_names)) return;

                        round.player_names.forEach(playerName => {
                            if (!stats[playerName]) {
                                stats[playerName] = {
                                    roundsPlayed: 0,
                                    lifetimePL: 0,
                                    nassauCount: 0,
                                    teamCount: 0,
                                    pointsCount: 0,
                                    partners: []
                                };
                            }
                            stats[playerName].roundsPlayed++;

                            // Calculate P/L from round state
                            if (round.state && round.state.pointsMoneyTotals && round.state.players) {
                                const playerIdx = round.state.players.findIndex(p =>
                                    p.name.toLowerCase() === playerName.toLowerCase()
                                );
                                if (playerIdx >= 0 && round.state.pointsMoneyTotals[playerIdx] !== undefined) {
                                    stats[playerName].lifetimePL += round.state.pointsMoneyTotals[playerIdx];
                                }
                            }

                            // Count games
                            if (round.state && round.state.games) {
                                if (round.state.games.nassau) stats[playerName].nassauCount++;
                                if (round.state.games.team) stats[playerName].teamCount++;
                                if (round.state.games.points) stats[playerName].pointsCount++;
                            }

                            // Track partners
                            if (!userPartners[playerName]) userPartners[playerName] = {};
                            round.player_names.forEach(partner => {
                                if (partner.toLowerCase() !== playerName.toLowerCase()) {
                                    userPartners[playerName][partner] = (userPartners[playerName][partner] || 0) + 1;
                                }
                            });
                        });
                    });

                    // Convert partner counts to sorted arrays
                    Object.keys(stats).forEach(playerName => {
                        if (userPartners[playerName]) {
                            stats[playerName].partners = Object.entries(userPartners[playerName])
                                .map(([name, count]) => ({ name, count }))
                                .sort((a, b) => b.count - a.count)
                                .slice(0, 5);
                        }
                    });

                    this.adminData.userStats = stats;
                },

                sortAdminUsers(field) {
                    if (this.adminSortField === field) {
                        this.adminSortDir = this.adminSortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.adminSortField = field;
                        this.adminSortDir = 'asc';
                    }

                    const sorted = [...this.adminData.users].sort((a, b) => {
                        let aVal, bVal;
                        if (field === 'name') {
                            aVal = a.user_name.toLowerCase();
                            bVal = b.user_name.toLowerCase();
                        } else if (field === 'roundsPlayed') {
                            aVal = this.adminData.userStats[a.user_name]?.roundsPlayed || 0;
                            bVal = this.adminData.userStats[b.user_name]?.roundsPlayed || 0;
                        } else if (field === 'lifetimePL') {
                            aVal = this.adminData.userStats[a.user_name]?.lifetimePL || 0;
                            bVal = this.adminData.userStats[b.user_name]?.lifetimePL || 0;
                        }

                        if (this.adminSortDir === 'asc') {
                            return aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                        } else {
                            return aVal > bVal ? -1 : aVal < bVal ? 1 : 0;
                        }
                    });

                    this.adminData.users = sorted;
                },

                async spectateRound(roundId, userName) {
                    if (!sb) return;
                    this.spectatingRound = roundId;
                    try {
                        const { data, error } = await sb.from('saturday_bets_rounds')
                            .select('*').eq('id', roundId).single();
                        if (error || !data || !data.state) { alert('Could not load round'); return; }
                        this.spectatingUser = data.user_name || userName || 'Live';
                        const st = data.state;
                        // Calculate player positions from the saved state
                        // We need to reconstruct enough to compute totals
                        const positions = [];
                        for (let pi = 0; pi < st.playerCount; pi++) {
                            positions.push({ name: st.players[pi].name, amount: 0 });
                        }
                        // The state includes nassauMatchups etc., so we can read totals directly
                        // Player 0 position = total winnings from cloud
                        positions[0].amount = data.total_winnings || 0;
                        // For all players, reconstruct from nassau matchups
                        if (st.games?.nassau && st.nassauMatchups) {
                            for (const m of st.nassauMatchups) {
                                const w = (m.front9?.winnings||0)+(m.back9?.winnings||0)+(m.overall?.winnings||0)+((m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0));
                                const a = m.playerA != null ? m.playerA : 0;
                                const b = m.playerB != null ? m.playerB : (m.playerIndex || 1);
                                if (a < st.playerCount) positions[a].amount += w;
                                if (b < st.playerCount) positions[b].amount -= w;
                            }
                        }
                        if (st.games?.team && st.teamSegments) {
                            for (const seg of st.teamSegments) {
                                for (const match of (seg.matches || [])) {
                                    const inBox = seg.box.includes(0);
                                    if (!inBox && !match.teamB?.includes(0)) continue;
                                    const w = (match.combined?.winnings||0) + ((match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0));
                                    if (inBox) positions[0].amount += w;
                                    else positions[0].amount -= w;
                                }
                            }
                        }
                        if (st.games?.points && st.pointsMoneyTotals) {
                            for (let pi = 0; pi < st.playerCount; pi++) {
                                if (positions[pi]) positions[pi].amount += (st.pointsMoneyTotals[pi] || 0);
                            }
                        }
                        st._position = data.total_winnings || 0;
                        st._playerPositions = positions;
                        this.spectatingState = st;
                        this.currentScreen = 'spectating';
                    } catch(e) {
                        console.warn('Spectate failed:', e);
                        alert('Error loading round details');
                    }
                },

                async loadLeaderboard() {
                    if (!sb) return;
                    this.leaderboardLoading = true;
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        const clubId = this.club?.id;
                        const query = sb.from('saturday_bets_rounds')
                            .select('id, user_name, course, tees, status, player_names, state, updated_at, session_code')
                            .eq('date', today)
                            .or('status.eq.in_progress,status.eq.completed,status.eq.finalized');
                        if (clubId) query.eq('club_id', clubId);
                        if (this.sessionCode) query.eq('session_code', this.sessionCode);
                        const { data, error } = await query.order('updated_at', { ascending: false });
                        if (error || !data) { this.leaderboardLoading = false; return; }
                        // Extract all players from all rounds into one combined list
                        const players = [];
                        for (const round of data) {
                            if (!round.state) continue;
                            const st = round.state;
                            const holeData = st.holeData || [];
                            const coursePar = holeData.reduce((s, h) => s + (h.par || 0), 0) || 72;
                            for (let pi = 0; pi < st.playerCount; pi++) {
                                const p = st.players[pi];
                                if (!p || !p.name) continue;
                                let gross = 0, holesPlayed = 0, parForPlayed = 0, strokesReceived = 0;
                                const holeScores = [];
                                const hdcp = p.handicap || 0;
                                for (let h = 0; h < 18; h++) {
                                    const s = st.scores?.[h]?.[pi];
                                    holeScores.push(s);
                                    if (s !== null && s !== undefined) {
                                        gross += s;
                                        holesPlayed++;
                                        parForPlayed += holeData[h]?.par || 0;
                                        const holeHcp = holeData[h]?.hcp || (h + 1);
                                        // First 18 strokes: get a stroke if handicap >= hole's hcp ranking
                                        if (hdcp >= holeHcp) strokesReceived++;
                                        // Strokes beyond 18: extra stroke on hardest holes
                                        if (hdcp > 18 && (hdcp - 18) >= holeHcp) strokesReceived++;
                                    }
                                }
                                const front9 = holeScores.slice(0, 9).reduce((t, s) => s !== null && s !== undefined ? t + s : t, 0);
                                const back9 = holeScores.slice(9, 18).reduce((t, s) => s !== null && s !== undefined ? t + s : t, 0);
                                const hasFront = holeScores.slice(0, 9).some(s => s !== null && s !== undefined);
                                const hasBack = holeScores.slice(9, 18).some(s => s !== null && s !== undefined);
                                const net = holesPlayed > 0 ? gross - strokesReceived : null;
                                const netToPar = holesPlayed > 0 ? (gross - strokesReceived) - parForPlayed : null;
                                players.push({
                                    name: p.name, handicap: p.handicap || 0,
                                    gross, net, netToPar, strokesReceived, parForPlayed, holesPlayed,
                                    front9: hasFront ? front9 : null,
                                    back9: hasBack ? back9 : null,
                                    holeScores, holeData,
                                    course: round.course || st.courseName || '',
                                    tees: round.tees || st.teeName || '',
                                    roundId: round.id, scorekeeper: round.user_name,
                                    status: round.status, coursePar
                                });
                            }
                        }
                        // Sort by active sort mode (net or gross), unplayed at bottom
                        const sortKey = this.leaderboardSort === 'net' ? 'netToPar' : 'gross';
                        players.sort((a, b) => {
                            if (a.holesPlayed === 0 && b.holesPlayed === 0) return 0;
                            if (a.holesPlayed === 0) return 1;
                            if (b.holesPlayed === 0) return -1;
                            if (sortKey === 'netToPar') return (a.netToPar ?? 999) - (b.netToPar ?? 999);
                            return a.gross - b.gross;
                        });
                        this.leaderboardData = players;
                        // Preserve selected player panel across refreshes
                        if (this.selectedLeaderboardPlayer) {
                            const prev = this.selectedLeaderboardPlayer;
                            const match = players.find(p => p.roundId === prev.roundId && p.name === prev.name);
                            this.selectedLeaderboardPlayer = match || null;
                        }
                        this.leaderboardLastUpdate = new Date().toLocaleTimeString();
                        this.currentScreen = 'leaderboard';
                    } catch(e) { console.warn('Leaderboard failed:', e); }
                    this.leaderboardLoading = false;
                },

                                async loadMyPL() {
                    if (!sb || !this.loggedInUser) { this.plLoading = false; return; }
                    try {
                        const clubId = this.club?.id;
                        const q = sb.from('saturday_bets_rounds')
                            .select('id, date, user_name, course, tees, status, player_names, state')
                            .or('status.eq.completed,status.eq.finalized')
                            .order('date', { ascending: true });
                        if (clubId) q.eq('club_id', clubId);
                        const { data: allRounds, error } = await q;
                        if (error) { console.warn('P/L load error:', error); this.plLoading = false; return; }
                        const seen = new Map();
                        const rounds = [];
                        for (const r of (allRounds || [])) {
                            const key = r.date + '|' + (r.player_names || []).sort().join(',');
                            if (!seen.has(key)) { seen.set(key, true); rounds.push(r); }
                        }
                        const me = this.loggedInUser.toLowerCase();
                        const myRounds = [];
                        const h2hMap = {};
                        const partnerMap = {};
                        let runningTotal = 0;
                        for (const r of rounds) {
                            const st = r.state || {};
                            const pls = st.players || [];
                            const pc = st.playerCount || pls.length;
                            let myIdx = -1;
                            for (let i = 0; i < pc; i++) {
                                if (pls[i]?.name?.toLowerCase() === me) { myIdx = i; break; }
                            }
                            if (myIdx === -1) continue;
                            let indiesTotal = 0, teamTotal = 0, pointsTotal = 0;
                            if (st.games?.nassau && st.nassauMatchups) {
                                for (const m of st.nassauMatchups) {
                                    const w = (m.front9?.winnings||0) + (m.back9?.winnings||0) + (m.overall?.winnings||0) + (m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                    let myNet = 0;
                                    if (m.playerA === myIdx) myNet = w;
                                    else if (m.playerB === myIdx) myNet = -w;
                                    else continue;
                                    indiesTotal += myNet;
                                    const oppIdx = m.playerA === myIdx ? m.playerB : m.playerA;
                                    const oppName = pls[oppIdx]?.name || 'Unknown';
                                    if (!h2hMap[oppName]) h2hMap[oppName] = { name: oppName, total: 0, wins: 0, losses: 0, ties: 0, rounds: [] };
                                    h2hMap[oppName].total += myNet;
                                    if (myNet > 0) h2hMap[oppName].wins++;
                                    else if (myNet < 0) h2hMap[oppName].losses++;
                                    else h2hMap[oppName].ties++;
                                    h2hMap[oppName].rounds.push({ date: r.date, net: myNet });
                                }
                            }
                            if (st.games?.points && st.pointsMoneyTotals) {
                                pointsTotal = st.pointsMoneyTotals[myIdx] || 0;
                            }
                            if (st.games?.team && st.teamSegments) {
                                for (const seg of st.teamSegments) {
                                    const inBox = seg.box?.includes(myIdx);
                                    for (const match of (seg.matches || [])) {
                                        const inOpp = match.teamB?.includes(myIdx);
                                        if (!inBox && !inOpp) continue;
                                        let mw = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                        let myTeamNet = inBox ? mw : -mw;
                                        teamTotal += myTeamNet;
                                        let partnerIdxs, oppIdxs;
                                        if (inBox) {
                                            partnerIdxs = (seg.box || []).filter(i => i !== myIdx);
                                            oppIdxs = match.teamB || [];
                                        } else {
                                            partnerIdxs = (match.teamB || []).filter(i => i !== myIdx);
                                            oppIdxs = seg.box || [];
                                        }
                                        for (const pi of partnerIdxs) {
                                            const pName = pls[pi]?.name || 'Unknown';
                                            if (!partnerMap[pName]) partnerMap[pName] = { name: pName, total: 0, wins: 0, losses: 0, ties: 0, rounds: [] };
                                            partnerMap[pName].total += myTeamNet;
                                            if (myTeamNet > 0) partnerMap[pName].wins++;
                                            else if (myTeamNet < 0) partnerMap[pName].losses++;
                                            else partnerMap[pName].ties++;
                                            partnerMap[pName].rounds.push({ date: r.date, net: myTeamNet, opponents: oppIdxs.map(i => pls[i]?.name || '?').join(' & ') });
                                        }
                                    }
                                }
                            }
                            const roundTotal = indiesTotal + teamTotal + pointsTotal;
                            runningTotal += roundTotal;
                            const playerScores = [];
                            const stScores = st.scores || [];
                            for (let pi2 = 0; pi2 < pc; pi2++) {
                                let gross = 0, hasScore = false;
                                for (let h = 0; h < 18; h++) {
                                    const sv = stScores[h]?.[pi2];
                                    if (sv !== null && sv !== undefined) { gross += sv; hasScore = true; }
                                }
                                const hdcp = pls[pi2]?.handicap || 0;
                                playerScores.push({ name: pls[pi2]?.name || 'Unknown', gross: hasScore ? gross : null, net: hasScore ? gross - hdcp : null, isMe: pi2 === myIdx });
                            }
                            myRounds.push({
                                id: r.id, date: r.date, course: r.course || st.courseName || '', tees: r.tees || st.teeName || '',
                                total: roundTotal, indiesTotal, teamTotal, pointsTotal,
                                runningTotal, players: (r.player_names || []).filter(n => n.toLowerCase() !== me),
                                playerScores
                            });
                        }
                        this.plRounds = myRounds.reverse();
                        this.plSeasonTotal = runningTotal;
                        this.plH2H = Object.values(h2hMap);
                        this.plPartners = Object.values(partnerMap);
                    } catch(e) { console.warn('P/L failed:', e); }
