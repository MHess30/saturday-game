                        this.ledgerRounds = uniqueRounds.map(r => {
                            const st = r.state || {};
                            const pt = st.playerTotals || {};
                            // Fallback: compute from state if playerTotals not present
                            if (Object.keys(pt).length === 0 && st.players) {
                                for (let i = 0; i < (st.playerCount || 0); i++) {
                                    const n = st.players[i]?.name;
                                    if (!n) continue;
                                    let t = 0;
                                    // Indies
                                    if (st.games?.nassau && st.nassauMatchups) {
                                        for (const m of st.nassauMatchups) {
                                            const w = (m.front9?.winnings||0) + (m.back9?.winnings||0) + (m.overall?.winnings||0) + (m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                            if (m.playerA === i) t += w;
                                            else if (m.playerB === i) t -= w;
                                        }
                                    }
                                    // Points
                                    if (st.games?.points && st.pointsMoneyTotals) t += (st.pointsMoneyTotals[i] || 0);
                                    // Team (approximate from segments)
                                    if (st.games?.team && st.teamSegments) {
                                        for (const seg of st.teamSegments) {
                                            const inBox = seg.box?.includes(i);
                                            for (const match of (seg.matches || [])) {
                                                const inOpp = match.teamB?.includes(i);
                                                if (!inBox && !inOpp) continue;
                                                let mw = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                                t += inBox ? mw : -mw;
                                            }
                                        }
                                    }
                                    pt[n] = t;
                                }
                            }
                            return { id: r.id, date: r.date, course: r.course || st.courseName || '', tees: r.tees || st.teeName || '', scorekeeper: r.user_name, status: r.status, playerTotals: pt, playerNames: r.player_names || [] };
                        });
                        // Compute running balances per player
                        const balMap = {};
                        for (const r of this.ledgerRounds) {
                            for (const [name, amt] of Object.entries(r.playerTotals)) {
                                balMap[name] = (balMap[name] || 0) + amt;
                            }
                        }
                        // Load payments
                        try {
                            const pq = sb.from('saturday_bets_payments').select('*').order('created_at', { ascending: false });
                            if (clubId) pq.eq('club_id', clubId);
                            const { data: payments } = await pq;
                            this.ledgerPayments = payments || [];
                            for (const p of this.ledgerPayments) {
                                balMap[p.from_player] = (balMap[p.from_player] || 0) + p.amount;
                                balMap[p.to_player] = (balMap[p.to_player] || 0) - p.amount;
                            }
                        } catch(e) { this.ledgerPayments = []; }
                        this.ledgerBalances = Object.entries(balMap).map(([name, bal]) => ({ name, balance: bal })).sort((a, b) => b.balance - a.balance);
                    } catch(e) { console.warn('Ledger failed:', e); }
                    this.ledgerLoading = false;
                },
                async recordPayment() {
                    if (!sb || !this.paymentForm.from || !this.paymentForm.to || !this.paymentForm.amount) return;
                    const amt = parseFloat(this.paymentForm.amount);
                    if (isNaN(amt) || amt <= 0) { alert('Enter a valid amount'); return; }
                    try {
                        const { error } = await sb.from('saturday_bets_payments').insert({
                            club_id: this.club?.id,
                            from_player: this.paymentForm.from,
                            to_player: this.paymentForm.to,
                            amount: amt,
                            note: this.paymentForm.note || 'Venmo',
                            recorded_by: this.loggedInUser
                        });
                        if (error) { alert('Error recording payment: ' + error.message); return; }
                        this.showRecordPayment = false;
                        this.paymentForm = { from: '', to: '', amount: '', note: 'Venmo' };
                        await this.loadLedger();
                    } catch(e) { alert('Payment failed: ' + e.message); }
                },

                /* ── Cloud Save/Load ── */
                getStateSnapshot() {
                    const pt = {};
                    for (let i = 0; i < this.playerCount; i++) {
                        const n = this.players[i].name;
                        if (n) pt[n] = this.getPlayerTotal(i);
                    }
                    return {
                        playerCount: this.playerCount, players: this.players, courseName: this.courseName,
                        teeName: this.teeName, startHole: this.startHole, games: this.games,
                        nassauBets: this.nassauBets, nassauPressMode: this.nassauPressMode, indieFormat: this.indieFormat,
                        indieGameType: this.indieGameType, indieSkipped: this.indieSkipped, teamGameType: this.teamGameType, teamMatchStyle: this.teamMatchStyle,
                        teamBet: this.teamBet, teamBets: this.teamBets, teamFormat: this.teamFormat, teamBalls: this.teamBalls,
                        pointsBet: this.pointsBet, useTeamPro: this.useTeamPro, roundStarted: this.roundStarted, scores: this.scores,
                        holeIndex: this.holeIndex, currentScreen: this.currentScreen,
                        nassauMatchups: this.nassauMatchups, nassauStrokes: this.nassauStrokes,
                        teamSegments: this.teamSegments, teamStrokes: this.teamStrokes,
                        pointsTotals: this.pointsTotals, pointsMoneyTotals: this.pointsMoneyTotals,
                        pointsStrokes: this.pointsStrokes, holeData: this.holeData,
                        bigTeamEnabled: this.bigTeamEnabled, bigTeamBalls: this.bigTeamBalls,
                        bigTeamFront: this.bigTeamFront, bigTeamBack: this.bigTeamBack, bigTeamOverall: this.bigTeamOverall,
                        sessionCode: this.sessionCode,
                        playerTotals: pt
                    };
                },
                // ── Game Session Code ─────────────────────────
                createSessionCode() {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    let code = '';
                    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
                    this.sessionCode = code;
                    this.sessionCreator = true;
                    localStorage.setItem('sbSessionCode', code);
                    this.saveState();
                },
                joinSession() {
                    const code = (this.joinCodeInput || '').toUpperCase().trim();
                    if (!code || code.length < 4) { alert('Enter a valid game code'); return; }
                    this.sessionCode = code;
                    this.sessionCreator = false;
                    this.showJoinGame = false;
                    this.joinCodeInput = '';
                    localStorage.setItem('sbSessionCode', code);
                    this.saveState();
                },
                async shareSession() {
                    const url = window.location.origin + window.location.pathname + '?session=' + this.sessionCode;
                    const msg = 'Join my FLOG game! Code: ' + this.sessionCode + '\n' + url;
                    if (navigator.share) {
                        try { await navigator.share({ title: 'FLOG Games', text: msg }); return; } catch(e) {}
                    }
                    try { await navigator.clipboard.writeText(msg); alert('Game link copied to clipboard!'); }
                    catch(e) { prompt('Share this link with your other groups:', msg); }
                },
                leaveSession() {
                    this.sessionCode = null;
                    this.sessionCreator = false;
                    localStorage.removeItem('sbSessionCode');
                    this.saveState();
                },

                async shareInviteLink() {
                    const url = 'https://floggames.com/signup/';
                    const msg = "I've been using this app for a few weeks to track my golf matches. It's amazing! No more math in the 19th hole, just drinks! Check it out: " + url;
                    if (navigator.share) {
                        try { await navigator.share({ title: 'FLOG Games', text: msg }); return; } catch(e) {}
                    }
                    try { await navigator.clipboard.writeText(msg); alert('Invite link copied!'); }
                    catch(e) { prompt('Share this with your golf buddies:', msg); }
                },

                async saveToCloud(status) {
                    if (!sb || !this.loggedInUser) return;
                    this.cloudSaving = true;
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        const pNames = this.players.slice(0, this.playerCount).map(p => p.name);
                        const payload = {
                            user_name: this.loggedInUser,
                            club_id: this.club?.id,
                            date: today,
                            course: this.courseName,
                            tees: this.teeName,
                            status: status || 'in_progress',
                            player_names: pNames,
                            total_winnings: this.currentPosition,
                            state: this.getStateSnapshot(),
                            session_code: this.sessionCode || null
                        };
                        if (this.cloudRoundId) {
                            payload.updated_at = new Date().toISOString();
                            const { error } = await sb.from('saturday_bets_rounds').update(payload).eq('id', this.cloudRoundId);
                            if (error) console.warn('Cloud save error:', error.message);
                        } else {
                            const { data, error } = await sb.from('saturday_bets_rounds').insert(payload).select('id').single();
                            if (error) console.warn('Cloud save error:', error.message);
                            else { this.cloudRoundId = data.id; localStorage.setItem('sbCloudRoundId', data.id); }
                        }
                    } catch(e) { console.warn('Cloud save failed:', e); }
                    this.cloudSaving = false;
                },
                async loadHistory() {
                    if (!sb || !this.loggedInUser) return;
                    this.historyLoading = true;
                    try {
                        const me = this.loggedInUser;
                        const displayName = me.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        const { data, error } = await sb.from('saturday_bets_rounds')
                            .select('id, date, course, tees, status, player_names, total_winnings, created_at, user_name')
                            .eq('club_id', this.club?.id)
                            .neq('status', 'removed')
                            .or('user_name.eq.' + me + ',player_names.cs.{"' + displayName + '"}')
                            .order('date', { ascending: false })
                            .limit(50);
                        if (!error && data) {
                            const seen = new Set();
                            this.roundHistory = (data || []).filter(r => {
                                if (seen.has(r.id)) return false;
                                seen.add(r.id);
                                return true;
                            });
                        }
                    } catch(e) { console.warn('History load failed:', e); }
                    this.historyLoading = false;
                },
                async loadRoundFromCloud(roundId) {
                    if (!sb) return;
                    try {
                        const { data, error } = await sb.from('saturday_bets_rounds')
                            .select('*').eq('id', roundId).single();
                        if (error || !data) { alert('Could not load round'); return; }
                        if (data.status === 'completed' || data.status === 'finalized') {
                            // View-only: hydrate state for viewing
                            const st = data.state;
                            Object.assign(this, st);
                            { const c = COURSES[this.courseName]; if(c && c.tees[this.teeName]) this.holeData = buildHoleData(this.teeName, this.courseName); }
                            this.recalcStrokes(); this.updateAllGameLogic();
                            this.cloudRoundId = roundId;  // Track for edit button
                            this.viewingHistory = true;
                            this.currentScreen = 'summary';
                        } else {
                            // Resume in-progress round
                            const st = data.state;
                            Object.assign(this, st);
                            { const c = COURSES[this.courseName]; if(c && c.tees[this.teeName]) this.holeData = buildHoleData(this.teeName, this.courseName); }
                            this.recalcStrokes(); this.updateAllGameLogic();
                            this.cloudRoundId = roundId;
                            localStorage.setItem('sbCloudRoundId', roundId);
                            this.viewingHistory = false;
                            this.saveState();
                        }
                    } catch(e) { alert('Error loading round'); }
                },
                async deleteRound(roundId) {
                    if (!sb) return;
                    if (!this.isAdmin) { alert('Only admins can delete rounds.'); return; }
                    if (!confirm('Delete this round?\n\nThis will hide it from your history. It can be restored via Supabase if needed.')) return;
                    // Soft-delete: set status='removed' instead of hard DELETE. Hard DELETE was silently blocked by RLS policy; local state was updated anyway, so rounds "came back" on reload.
                    const { error } = await sb.from('saturday_bets_rounds').update({ status: 'removed', updated_at: new Date().toISOString() }).eq('id', roundId);
                    if (error) { alert('Error deleting round: ' + error.message); return; }
                    this.roundHistory = this.roundHistory.filter(r => r.id !== roundId);
                },
                sortLeaderboard(mode) {
                    this.leaderboardSort = mode;
                    const sortKey = mode === 'net' ? 'netToPar' : 'gross';
                    this.leaderboardData.sort((a, b) => {
                        if (a.holesPlayed === 0 && b.holesPlayed === 0) return 0;
                        if (a.holesPlayed === 0) return 1;
                        if (b.holesPlayed === 0) return -1;
                        if (sortKey === 'netToPar') return (a.netToPar ?? 999) - (b.netToPar ?? 999);
                        return a.gross - b.gross;
                    });
                },
                async finalizeRound(roundId) {
                        if (!sb) return;
                        if (!this.isAdmin) { alert('Only admins can finalize rounds.'); return; }
                        if (!confirm('Finalize this round? Scores will be locked and used for pari-mutuel settlement in Saturday Game.')) return;
                        try {
                            const { error } = await sb.from('saturday_bets_rounds').update({ status: 'finalized', updated_at: new Date().toISOString() }).eq('id', roundId);
                            if (error) { alert('Error finalizing round: ' + error.message); return; }
                            this.leaderboardData.forEach(p => { if (p.roundId === roundId) p.status = 'finalized'; });
                        this.leaderboardData = [...this.leaderboardData];
                        if (this.selectedLeaderboardPlayer && this.selectedLeaderboardPlayer.roundId === roundId) {
                            this.selectedLeaderboardPlayer = {...this.selectedLeaderboardPlayer, status: 'finalized'};
                        }
                        } catch(e) { alert('Error finalizing round'); }
                    },
                    async unlockRound(roundId) {
                        if (!sb) return;
                        if (!this.isAdmin) { alert('Only admins can unlock rounds.'); return; }
                        if (!confirm('Unlock this round for score edits? If Saturday Game already settled, it will re-settle when you re-finalize.')) return;
                        try {
                            const { error } = await sb.from('saturday_bets_rounds').update({ status: 'completed', updated_at: new Date().toISOString() }).eq('id', roundId);
                            if (error) { alert('Error unlocking round: ' + error.message); return; }
                            this.leaderboardData.forEach(p => { if (p.roundId === roundId) p.status = 'completed'; });
                        this.leaderboardData = [...this.leaderboardData];
                        if (this.selectedLeaderboardPlayer && this.selectedLeaderboardPlayer.roundId === roundId) {
                            this.selectedLeaderboardPlayer = {...this.selectedLeaderboardPlayer, status: 'completed'};
                        }
                        } catch(e) { alert('Error unlocking round'); }
                    },
                    async deleteLeaderboardRound(roundId) {
                    if (!sb) return;
                    if (!this.isAdmin) { alert('Only admins can delete rounds.'); return; }
                    if (!confirm('Remove this round from the leaderboard?')) return;
                    try {
                        // Soft-delete: set status to 'removed' so it no longer appears in leaderboard queries
                        const { error } = await sb.from('saturday_bets_rounds').update({ status: 'removed', updated_at: new Date().toISOString() }).eq('id', roundId);
                        if (error) { alert('Error removing round: ' + error.message); return; }
                        this.leaderboardData = this.leaderboardData.filter(p => p.roundId !== roundId);
                        if (this.selectedLeaderboardPlayer && this.selectedLeaderboardPlayer.roundId === roundId) this.selectedLeaderboardPlayer = null;
                    } catch(e) { alert('Remove failed: ' + e.message); }
                },
                exitHistoryView() {
                    this.viewingHistory = false;
                    this.loadState();
                    { const c = COURSES[this.courseName]; if(c && c.tees[this.teeName]) this.holeData = buildHoleData(this.teeName, this.courseName); }
                    if (this.roundStarted) { this.recalcStrokes(); this.updateAllGameLogic(); }
                    else { this.currentScreen = 'setup'; }
                },

                saveState() { const st={playerCount:this.playerCount, players:this.players, courseName:this.courseName, teeName:this.teeName, startHole:this.startHole, games:this.games, nassauBets:this.nassauBets, nassauPressMode:this.nassauPressMode, indieFormat:this.indieFormat, indieGameType:this.indieGameType, indieSkipped:this.indieSkipped, teamGameType:this.teamGameType, teamMatchStyle:this.teamMatchStyle, teamBet:this.teamBet, teamBets:this.teamBets, teamFormat:this.teamFormat, teamBalls:this.teamBalls, teamRedistribute:this.teamRedistribute, pointsBet:this.pointsBet, pointsSweepers:this.pointsSweepers, useTeamPro:this.useTeamPro, roundStarted:this.roundStarted, scores:this.scores, holeIndex:this.holeIndex, currentScreen:this.currentScreen, nassauMatchups:this.nassauMatchups, nassauStrokes:this.nassauStrokes, teamSegments:this.teamSegments, teamStrokes:this.teamStrokes, pointsTotals:this.pointsTotals, pointsMoneyTotals:this.pointsMoneyTotals, pointsStrokes:this.pointsStrokes, holeData:this.holeData, bigTeamEnabled:this.bigTeamEnabled, bigTeamBalls:this.bigTeamBalls, bigTeamFront:this.bigTeamFront, bigTeamBack:this.bigTeamBack, bigTeamOverall:this.bigTeamOverall, skinsOpenEnabled:this.skinsOpenEnabled, skinsValidation:this.skinsValidation, skinsOpenBet:this.skinsOpenBet, skinsOpenResults:this.skinsOpenResults, snake:this.snake, ctp:this.ctp, bbb:this.bbb, dots:this.dots, wolf:this.wolf, putts:this.putts, reviewMode:this.reviewMode}; localStorage.setItem('saturdayBetsState', JSON.stringify(st)); },
                loadState() {
                    const s=localStorage.getItem('saturdayBetsState');
                    if(s) {
                        const st = JSON.parse(s);
                        // Backward compat: convert old array nassauBets to object
                        if (Array.isArray(st.nassauBets)) {
                            const obj = {};
                            st.nassauBets.forEach((b, i) => { obj['0-'+(i+1)] = b; });
                            st.nassauBets = obj;
                        }
                        // Backward compat: convert old single-number nassauBets values to structured objects
                        if (st.nassauBets && typeof st.nassauBets === 'object') {
                            for (const k of Object.keys(st.nassauBets)) {
                                const v = st.nassauBets[k];
                                if (typeof v === 'number') {
                                    st.nassauBets[k] = {match:v, front:v, back:v, overall:v, press:v};
                                }
                            }
                        }
                        // Backward compat: convert old nassauMatchups (playerIndex) to new (playerA/playerB)
                        if (st.nassauMatchups && st.nassauMatchups.length > 0 && st.nassauMatchups[0].playerIndex !== undefined) {
                            for (const m of st.nassauMatchups) {
                                m.playerA = 0;
                                m.playerB = m.playerIndex;
                                const bv = st.nassauBets['0-'+m.playerIndex]; m.bet = (typeof bv==='object'&&bv!==null) ? (bv.match||20) : (bv||20);
                                if (m.holes) for (const h of m.holes) { h.aNet = h.myNet || 0; h.bNet = h.theirNet || 0; }
                            }
                        }
                        // Backward compat: convert old nassauStrokes (forThem) to new (forB)
                        if (st.nassauStrokes && st.nassauStrokes.length > 0 && st.nassauStrokes[0].forThem !== undefined) {
                            for (const si of st.nassauStrokes) { si.forB = si.forThem; }
                        }
                        Object.assign(this, st);
                        // If no round is in progress, reset setup defaults for a clean slate
                        if (!this.roundStarted) {
                            this.playerCount = 4;
                            this.players = Array.from({length: this.playerCount}, () => ({name: '', handicap: 0}));
                            this.courseName = '';
                            this.teeName = '';
                            this.holeData = buildHoleData('', '');
                            this.indieGameType = 'none';
                            this.teamGameType = 'none';
                            this.games = { nassau: false, team: false, points: false };
                            this.bigTeamEnabled = false;
                        }
                        // Backward compat: indie skipped defaults
                        if (!this.indieSkipped) this.indieSkipped = {};
                        // Backward compat: team match style
                        if (!this.teamMatchStyle) {
                            if (this.teamFormat === 'nassau') this.teamMatchStyle = 'nassau_auto';
                            else this.teamMatchStyle = 'straight18_auto';
                        }
                        // Backward compat: Big Team defaults
                        if (this.bigTeamEnabled === undefined) this.bigTeamEnabled = false;
                        if (this.bigTeamBalls === undefined) this.bigTeamBalls = 2;
                        if (this.bigTeamFront === undefined) this.bigTeamFront = 10;
                        if (this.bigTeamBack === undefined) this.bigTeamBack = 10;
                        if (this.bigTeamOverall === undefined) this.bigTeamOverall = 10;
                        if (this.sessionCode === undefined) this.sessionCode = null;
                        // Backward compat: add new game type fields if missing
                        if (!this.indieFormat) this.indieFormat = 'straight';
                        if (!this.indieGameType) {
                            if (this.games.nassau) {
                                if (this.nassauPressMode === 'aloha') this.indieGameType = 'straight18_aloha';
                                else if (this.nassauPressMode === 'auto') this.indieGameType = 'straight18_auto';
                                else this.indieGameType = 'straight18';
                            } else { this.indieGameType = 'none'; }
                        }
                        if (!this.teamGameType) {
                            if (this.games.team) {
                                this.teamGameType = this.teamFormat === 'nassau' ? 'nassau_2ball_auto' : 'straight6_2ball_auto';
                            } else { this.teamGameType = 'none'; }
                        }
                        if (this.teamBalls === undefined) this.teamBalls = 2;
                        if (this.teamRedistribute === undefined) this.teamRedistribute = true;
                        if (this.pointsSweepers === undefined) this.pointsSweepers = true;
                        // Backward compat: derive teamBets from old single teamBet
                        if (!this.teamBets || typeof this.teamBets !== 'object') {
                            const b = this.teamBet || 25;
                            this.teamBets = {overall: b*2, front: b, back: b, press: b};
                        }
                        if (!this.nassauPressMode) this.nassauPressMode = 'auto';
                        // Backward compat: Side Bets defaults
                        if (this.skinsOpenEnabled === undefined) this.skinsOpenEnabled = false;
                        if (this.skinsValidation === undefined) this.skinsValidation = false;
                        if (this.skinsOpenBet === undefined) this.skinsOpenBet = 5;
                        if (!this.skinsOpenResults) this.skinsOpenResults = [];
                        if (!this.snake) this.snake = { enabled: false, bet: 5, holder: null, history: [] };
                        if (!this.ctp) this.ctp = { enabled: false, bet: 5, results: [] };
                        if (!this.bbb) this.bbb = { enabled: false, betPerPoint: 2, results: [] };
                        if (!this.dots) this.dots = { enabled: false, betPerDot: 1, types: ['sandy', 'greenie', 'barkie', 'polie', 'exotic', 'birdie'], results: [], playerConfig: [] };
                        if (!this.dots.playerConfig) this.dots.playerConfig = [];
                        if (!this.wolf) this.wolf = { enabled: false, bet: 5, results: [] };
                        if (!this.putts) this.putts = Array(18).fill(null).map(() => Array(6).fill(null));
                    }
                }
            };
        }
