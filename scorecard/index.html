<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Saturday Bets">
    <meta name="theme-color" content="#1a1a1a">
    <title>Saturday Bets - Golf Betting Tracker</title>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  SUPABASE SQL SCHEMA — Run this in your Supabase SQL Editor ║
    ╚══════════════════════════════════════════════════════════════╝

    CREATE TABLE saturday_bets_users (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT UNIQUE NOT NULL,
        pin_hash TEXT NOT NULL,
        email TEXT,
        is_admin BOOLEAN DEFAULT false
    );

    ALTER TABLE saturday_bets_users ENABLE ROW LEVEL SECURITY;

    -- Users: anyone can read & create accounts
    CREATE POLICY "Allow select for anon" ON saturday_bets_users
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_users
        FOR INSERT WITH CHECK (true);
    -- Only the user themselves (or admin) can update their own row
    CREATE POLICY "Allow update own or admin" ON saturday_bets_users
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete users
    CREATE POLICY "Admin delete only" ON saturday_bets_users
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );

    CREATE TABLE saturday_bets_rounds (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT NOT NULL,
        date DATE NOT NULL,
        course TEXT DEFAULT 'El Caballero',
        tees TEXT,
        status TEXT DEFAULT 'in_progress',
        player_names TEXT[],
        total_winnings NUMERIC DEFAULT 0,
        state JSONB NOT NULL
    );

    CREATE INDEX idx_bets_user ON saturday_bets_rounds(user_name);
    CREATE INDEX idx_bets_date ON saturday_bets_rounds(date DESC);
    CREATE INDEX idx_bets_status ON saturday_bets_rounds(status);

    ALTER TABLE saturday_bets_rounds ENABLE ROW LEVEL SECURITY;

    -- Rounds: anyone can read & create
    CREATE POLICY "Allow select for anon" ON saturday_bets_rounds
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_rounds
        FOR INSERT WITH CHECK (true);
    -- Only the round owner (or admin) can update
    CREATE POLICY "Allow update own or admin" ON saturday_bets_rounds
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete rounds
    CREATE POLICY "Admin delete only" ON saturday_bets_rounds
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --black: #1a1a1a;
            --black-light: #2d2d2d;
            --gold: #c8a951;
            --gold-light: #e8d48b;
            --gold-dark: #a08830;
            --gold-pale: #f5f0e0;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e0e0e0;
            --gray-400: #999999;
            --gray-700: #555555;
            --green: #2ecc71;
            --green-dark: #1a9c54;
            --red: #e74c3c;
            --red-light: #fdecea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: var(--black);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 60px;
        }

        /* ===== SETUP SCREEN ===== */
        .setup-screen {
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .setup-section {
            margin-bottom: 20px;
            background-color: var(--black-light);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--gold-dark);
        }

        .setup-section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .player-count-toggle, .game-toggles {
            display: flex;
            gap: 8px;
        }

        .player-input-group {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .player-input-row input {
            flex: 1;
            background-color: var(--black);
            border: 1px solid var(--gold-dark);
            color: var(--white);
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        .player-input-row input::placeholder {
            color: var(--gray-400);
        }

        .handicap-input {
            width: 60px;
            text-align: center;
        }

        .tee-buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .bet-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bet-label {
            font-size: 12px;
            color: var(--gold-light);
            min-width: 80px;
        }

        .bet-input-group input {
            width: 80px;
            background-color: var(--black);
            border: 1px solid var(--gold-dark);
            color: var(--white);
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .toggle-btn {
            flex: 1;
            background-color: var(--black);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            border-radius: 12px;
            background-color: var(--gray-700);
            border: 2px solid var(--gray-400);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--white);
            top: 3px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.on {
            background-color: var(--green);
            border-color: var(--green-dark);
        }

        .toggle-switch.on::after {
            left: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-toggles {
            flex-direction: column;
            gap: 12px;
        }

        .bet-amounts {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .start-button {
            background-color: var(--gold);
            color: var(--black);
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .start-button:active {
            transform: scale(0.98);
        }

        /* ===== SCORE ENTRY SCREEN ===== */
        .score-entry-screen {
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .score-entry-header {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hole-info {
            flex: 1;
        }

        .hole-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
        }

        .hole-detail {
            font-size: 12px;
            color: var(--gold-light);
            margin-top: 4px;
        }

        .position-summary {
            text-align: right;
        }

        .position-label {
            font-size: 11px;
            color: var(--gray-400);
        }

        .position-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 4px;
        }

        .position-value.positive {
            color: var(--green);
        }

        .position-value.negative {
            color: var(--red);
        }

        .score-entry-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 60px;
        }

        .player-score-card {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 10px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .player-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gold-light);
        }

        .stroke-indicator {
            font-size: 10px;
            background-color: var(--red);
            color: var(--white);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        .score-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-button {
            width: 40px;
            height: 40px;
            background-color: var(--black);
            border: 1px solid var(--gold-dark);
            color: var(--gold);
            font-size: 18px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-button:active {
            background-color: var(--gold-dark);
            color: var(--black);
        }

        .score-display {
            flex: 1;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
        }

        .score-nav {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .nav-button {
            flex: 1;
            background-color: var(--gold);
            color: var(--black);
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-button:disabled {
            background-color: var(--gray-700);
            color: var(--gray-400);
            cursor: not-allowed;
        }

        /* ===== RESULTS & TAB SCREENS ===== */
        .results-screen {
            padding: 12px;
        }

        .scorecard-container {
            margin-bottom: 20px;
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            overflow: hidden;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 600px;
            table-layout: fixed;
        }

        .scorecard-table th, .scorecard-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid var(--gold-dark);
        }

        .scorecard-table th {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .scorecard-table td {
            background-color: var(--black-light);
            color: var(--white);
        }

        .scorecard-table td.score-cell {
            font-weight: 600;
        }

        .scorecard-table .player-label {
            text-align: left;
            color: var(--gold-light);
            font-weight: 600;
            min-width: 80px;
        }

        .scorecard-table .subtotal {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
        }

        /* NASSAU TAB */
        .nassau-matchup {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .matchup-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .nassau-result-row {
            display: grid;
            grid-template-columns: 80px 1fr 100px;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--gold-dark);
            align-items: center;
        }

        .nassau-result-row:last-child {
            border-bottom: none;
        }

        .nassau-label {
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
        }

        .nassau-status {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .nassau-status.me-up {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--green);
        }

        .nassau-status.me-down {
            background-color: rgba(231, 76, 60, 0.2);
            color: var(--red);
        }

        .nassau-status.all-square {
            background-color: rgba(153, 153, 153, 0.2);
            color: var(--gray-200);
        }

        .nassau-amount {
            font-weight: 700;
            text-align: right;
            padding: 4px 8px;
        }

        .nassau-amount.positive {
            color: var(--green);
        }

        .nassau-amount.negative {
            color: var(--red);
        }

        .press-section {
            margin-top: 8px;
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
            border: 1px dashed var(--gold-dark);
        }

        .press-label {
            font-size: 11px;
            color: var(--gold-light);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .press-item {
            display: grid;
            grid-template-columns: 60px 1fr 80px;
            gap: 8px;
            font-size: 11px;
            padding: 4px 0;
            align-items: center;
        }

        .hole-detail-toggle {
            margin-top: 8px;
            padding: 8px;
            background-color: var(--black);
            border: 1px solid var(--gold-dark);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
            user-select: none;
        }

        .hole-detail-grid {
            display: grid;
            grid-template-columns: 40px 60px 60px 50px;
            gap: 8px;
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
            margin-top: 6px;
            font-size: 11px;
            overflow-x: auto;
        }

        .hole-detail-header {
            font-weight: 700;
            color: var(--gold);
            text-align: center;
        }

        .hole-detail-row {
            display: contents;
        }

        .hole-detail-cell {
            padding: 4px;
            text-align: center;
            color: var(--white);
        }

        .hole-detail-hole {
            font-weight: 600;
            color: var(--gold-light);
        }

        .hole-detail-cell.win {
            color: var(--green);
            font-weight: 600;
        }

        .hole-detail-cell.loss {
            color: var(--red);
            font-weight: 600;
        }

        .hole-detail-cell.tie {
            color: var(--gray-200);
        }

        /* TEAMS TAB */
        .teams-segment {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .teams-segment-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .team-assignment {
            padding: 8px;
            background-color: var(--black);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .team-assignment-label {
            font-size: 12px;
            color: var(--gold-light);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .player-button {
            padding: 6px 10px;
            margin: 4px 4px;
            border: 1px solid var(--gold-dark);
            background-color: var(--black);
            color: var(--gold-light);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .player-button.unassigned {
            background-color: var(--gray-700);
            color: var(--gray-200);
            border-color: var(--gray-400);
        }

        .player-button.team-a {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--green);
            border-color: var(--green-dark);
        }

        .player-button.team-b {
            background-color: rgba(200, 169, 81, 0.2);
            color: var(--gold-light);
            border-color: var(--gold-dark);
        }

        .team-column {
            flex: 1;
        }

        .team-title {
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 6px;
        }

        /* POINTS TAB */
        .points-grid {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 16px;
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
        }

        .points-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 500px;
        }

        .points-table th, .points-table td {
            padding: 6px;
            border: 1px solid var(--gold-dark);
            text-align: center;
        }

        .points-table th {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .points-table td {
            background-color: var(--black-light);
            color: var(--white);
        }

        .points-table .hole-col {
            font-weight: 600;
            color: var(--gold-light);
        }

        .points-table .totals-row td {
            background-color: var(--black);
            color: var(--gold);
            font-weight: 700;
        }

        .points-cell-score {
            font-weight: 600;
        }

        .points-cell-points {
            color: var(--gold);
            font-weight: 600;
        }

        .points-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .points-summary-item {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .points-summary-label {
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .points-summary-value {
            font-size: 18px;
            font-weight: 700;
        }

        .points-summary-value.positive {
            color: var(--green);
        }

        .points-summary-value.negative {
            color: var(--red);
        }

        /* SUMMARY SCREEN */
        .summary-header {
            text-align: center;
            padding: 20px 12px;
            background-color: var(--black-light);
            border-bottom: 2px solid var(--gold);
        }

        .summary-total {
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 6px;
        }

        .summary-amount {
            font-size: 36px;
            font-weight: 800;
            margin-top: 4px;
        }

        .summary-amount.positive {
            color: var(--green);
        }

        .summary-amount.negative {
            color: var(--red);
        }

        .summary-box {
            background-color: var(--black-light);
            border: 1px solid var(--gold-dark);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .summary-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--gold-dark);
            font-size: 13px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-player-name {
            color: var(--gold-light);
            font-weight: 600;
        }

        .summary-amount {
            font-weight: 700;
        }

        .summary-amount.positive {
            color: var(--green);
        }

        .summary-amount.negative {
            color: var(--red);
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--black);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            flex: 1;
            height: 100%;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-icon.active {
            color: var(--gold);
        }

        /* UTILITIES */
        .expandable {
            user-select: none;
        }

        .expandable::after {
            content: ' ▼';
            font-size: 10px;
        }

        .expandable.expanded::after {
            content: ' ▲';
        }

        .score-cell {
            position: relative;
        }

        /* Score decorations: birdie=circle, bogey=square, double+=double square */
        .score-birdie {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-bogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-dblbogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;
            border: 1.5px solid var(--white); line-height: 1;
            outline: 1.5px solid var(--white); outline-offset: 2px;
        }
        .score-eagle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--white); line-height: 1;
            outline: 1.5px solid var(--white); outline-offset: 2px;
        }

        .has-stroke { position: relative; }
        .has-stroke::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--red);
        }

        [x-cloak] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container" x-data="saturdayBets()" x-init="init()" x-cloak>

        <!-- LOGIN OVERLAY -->
        <template x-if="showLogin">
            <div style="position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;">
                <div style="background:var(--black-light);border:1px solid var(--gold-dark);border-radius:16px;padding:32px;width:300px;">
                    <div style="text-align:center;margin-bottom:24px;">
                        <div style="font-size:28px;margin-bottom:4px;">⛳</div>
                        <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px;">Saturday Bets</div>
                    </div>

                    <!-- Mode Tabs -->
                    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--gold-dark);">
                        <button @click="loginMode='login'" :style="'flex:1;padding:10px;border:none;background:none;color:' + (loginMode==='login' ? 'var(--gold)' : 'var(--gray-400)') + ';font-weight:' + (loginMode==='login' ? '700' : '400') + ';font-size:13px;cursor:pointer;border-bottom:' + (loginMode==='login' ? '2px solid var(--gold)' : 'none') + ';margin-bottom:-1px;'">Login</button>
                        <button @click="loginMode='register'" :style="'flex:1;padding:10px;border:none;background:none;color:' + (loginMode==='register' ? 'var(--gold)' : 'var(--gray-400)') + ';font-weight:' + (loginMode==='register' ? '700' : '400') + ';font-size:13px;cursor:pointer;border-bottom:' + (loginMode==='register' ? '2px solid var(--gold)' : 'none') + ';margin-bottom:-1px;'">New Account</button>
                    </div>

                    <!-- Login Mode -->
                    <template x-if="loginMode === 'login'">
                        <div style="text-align:center;">
                            <div style="font-size:12px;color:var(--gray-400);margin-bottom:16px;">Enter your name & PIN</div>
                            <input type="text" x-model="loginName" placeholder="Your name" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gold-dark);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;">
                            <input type="tel" x-model="loginPin" placeholder="4-digit PIN" maxlength="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gold-dark);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;" @keyup.enter="doLogin()">
                            <div x-show="loginError" x-text="loginError" style="color:var(--red);font-size:11px;margin-bottom:8px;"></div>
                            <button @click="doLogin()" :disabled="loginLoading" style="width:100%;padding:10px;border-radius:8px;background:var(--gold);color:var(--black);font-weight:700;border:none;font-size:14px;cursor:pointer;margin-top:8px;opacity:" + (loginLoading ? '0.6' : '1') + ";" x-text="loginLoading ? 'Logging in...' : 'Login'"></button>
                            <div style="margin-top:12px;">
                                <button @click="loginError='Contact the admin (Michael) to reset your PIN.'" style="background:none;border:none;color:var(--gold-dark);text-decoration:underline;font-size:11px;cursor:pointer;">Forgot PIN?</button>
                            </div>
                        </div>
                    </template>

                    <!-- Register Mode -->
                    <template x-if="loginMode === 'register'">
                        <div style="text-align:center;">
                            <div style="font-size:12px;color:var(--gray-400);margin-bottom:16px;">Create a new account</div>
                            <input type="text" x-model="loginName" placeholder="Your name" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gold-dark);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;">
                            <input type="tel" x-model="loginPin" placeholder="4-digit PIN" maxlength="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gold-dark);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;">
                            <input type="tel" x-model="confirmPin" placeholder="Confirm PIN" maxlength="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gold-dark);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;" @keyup.enter="doRegister()">
                            <div x-show="loginError" x-text="loginError" style="color:var(--red);font-size:11px;margin-bottom:8px;"></div>
                            <button @click="doRegister()" :disabled="loginLoading" style="width:100%;padding:10px;border-radius:8px;background:var(--gold);color:var(--black);font-weight:700;border:none;font-size:14px;cursor:pointer;margin-top:8px;opacity:" + (loginLoading ? '0.6' : '1') + ";" x-text="loginLoading ? 'Creating account...' : 'Create Account'"></button>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- HISTORY VIEW BANNER -->
        <template x-if="viewingHistory">
            <div style="position:fixed;top:0;left:0;right:0;z-index:100;background:var(--gold-dark);color:var(--black);text-align:center;padding:8px;font-weight:700;font-size:13px;">
                Viewing Past Round <button @click="exitHistoryView()" style="margin-left:12px;padding:4px 12px;border-radius:6px;background:var(--black);color:var(--gold);border:none;font-size:12px;font-weight:600;cursor:pointer;">← Back</button>
            </div>
        </template>

        <div class="main-content">
            <!-- HISTORY SCREEN -->
            <template x-if="currentScreen === 'history'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div style="font-size:18px;font-weight:700;color:var(--gold);">Round History</div>
                        <button @click="currentScreen='setup'" style="padding:6px 14px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">← Back</button>
                    </div>
                    <div x-show="historyLoading" style="text-align:center;color:var(--gray-400);padding:40px 0;">Loading...</div>
                    <div x-show="!historyLoading && roundHistory.length === 0" style="text-align:center;color:var(--gray-400);padding:40px 0;">No past rounds found</div>
                    <template x-for="round in roundHistory" :key="round.id">
                        <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #333;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <div style="font-weight:700;color:var(--white);font-size:14px;" x-text="new Date(round.date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="round.course + ' · ' + round.tees"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="(round.player_names || []).join(', ')"></div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:16px;font-weight:700;" :style="{color: round.total_winnings > 0 ? 'var(--green)' : round.total_winnings < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(round.total_winnings > 0 ? '+$' : round.total_winnings < 0 ? '-$' : '$') + Math.abs(round.total_winnings || 0)"></div>
                                    <div style="font-size:10px;color:var(--gray-400);margin-top:2px;" x-text="round.status === 'completed' ? 'Final' : 'In Progress'"></div>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button @click="loadRoundFromCloud(round.id)" style="flex:1;padding:8px;border-radius:8px;background:var(--gold-dark);color:var(--black);font-weight:600;border:none;font-size:12px;cursor:pointer;" x-text="round.status === 'completed' ? 'View' : 'Resume'"></button>
                                <button x-show="round.status === 'completed'" @click="editCompletedRound(round.id)" style="padding:8px 12px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">✏️ Edit</button>
                                <button x-show="isAdmin" @click="deleteRound(round.id)" style="padding:8px 12px;border-radius:8px;background:#441111;color:var(--red);border:none;font-size:12px;cursor:pointer;">Delete</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- LIVE GAMES SCREEN (Admin) -->
            <template x-if="currentScreen === 'liveGames'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div style="font-size:18px;font-weight:700;color:var(--green,#2ecc71);">📡 Live Games</div>
                        <div style="display:flex;gap:8px;">
                            <button @click="loadLiveGames()" style="padding:6px 12px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">↻ Refresh</button>
                            <button @click="currentScreen='setup'" style="padding:6px 14px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">← Back</button>
                        </div>
                    </div>
                    <div x-show="liveGamesLoading" style="text-align:center;color:var(--gray-400);padding:40px 0;">Loading...</div>
                    <div x-show="!liveGamesLoading && liveGames.length === 0" style="text-align:center;color:var(--gray-400);padding:40px 0;">No active games right now</div>
                    <template x-for="game in liveGames" :key="game.id">
                        <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #333;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <div style="font-weight:700;color:var(--gold-light);font-size:15px;" x-text="game.user_name"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="game.course + ' · ' + (game.tees || '')"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="(game.player_names || []).join(', ')"></div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:16px;font-weight:700;" :style="{color: game.total_winnings > 0 ? 'var(--green)' : game.total_winnings < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(game.total_winnings > 0 ? '+$' : game.total_winnings < 0 ? '-$' : '$') + Math.abs(game.total_winnings || 0)"></div>
                                    <div style="font-size:10px;margin-top:2px;" :style="{color: game.status === 'in_progress' ? 'var(--green)' : 'var(--gray-400)'}" x-text="game.status === 'in_progress' ? '● Live' : 'Completed'"></div>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button @click="spectateRound(game.id, game.user_name)" style="flex:1;padding:8px;border-radius:8px;background:var(--gold-dark);color:var(--black);font-weight:600;border:none;font-size:12px;cursor:pointer;">👁️ View Details</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- SPECTATOR VIEW -->
            <template x-if="currentScreen === 'spectating'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div>
                            <div style="font-size:18px;font-weight:700;color:var(--gold);">👁️ Spectating</div>
                            <div style="font-size:12px;color:var(--gold-light);margin-top:2px;" x-text="spectatingUser + '\\'s Round'"></div>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button @click="spectateRound(spectatingRound, spectatingUser)" style="padding:6px 12px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">↻ Refresh</button>
                            <button @click="spectatingState=null; currentScreen='liveGames'; loadLiveGames()" style="padding:6px 14px;border-radius:8px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:12px;cursor:pointer;">← Back</button>
                        </div>
                    </div>

                    <template x-if="spectatingState">
                        <div>
                            <!-- Course & Hole Info -->
                            <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #333;">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <div>
                                        <div style="font-weight:700;color:var(--white);font-size:14px;" x-text="spectatingState.courseName + ' · ' + spectatingState.teeName"></div>
                                        <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="'Hole ' + (spectatingState.holeIndex + 1) + ' of 18'"></div>
                                    </div>
                                    <div style="font-size:20px;font-weight:800;" :style="{color: spectatingState._position > 0 ? 'var(--green)' : spectatingState._position < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(spectatingState._position > 0 ? '+$' : spectatingState._position < 0 ? '-$' : '$') + Math.abs(spectatingState._position || 0)"></div>
                                </div>
                            </div>

                            <!-- Scorecard -->
                            <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #333;overflow-x:auto;">
                                <div style="font-weight:700;color:var(--gold);font-size:13px;margin-bottom:10px;">Scorecard</div>
                                <table style="width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;">
                                    <thead>
                                        <tr>
                                            <th style="text-align:left;padding:4px 6px;color:var(--gray-400);font-size:10px;">Player</th>
                                            <template x-for="h in 9" :key="'sf'+h">
                                                <th style="text-align:center;padding:4px 3px;color:var(--gray-400);font-size:10px;min-width:22px;" x-text="h"></th>
                                            </template>
                                            <th style="text-align:center;padding:4px 4px;color:var(--gold);font-size:10px;font-weight:700;">OUT</th>
                                            <template x-for="h in 9" :key="'sb'+h">
                                                <th style="text-align:center;padding:4px 3px;color:var(--gray-400);font-size:10px;min-width:22px;" x-text="h+9"></th>
                                            </template>
                                            <th style="text-align:center;padding:4px 4px;color:var(--gold);font-size:10px;font-weight:700;">IN</th>
                                            <th style="text-align:center;padding:4px 4px;color:var(--gold);font-size:10px;font-weight:800;">TOT</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(player, pi) in spectatingState.players.slice(0, spectatingState.playerCount)" :key="'sp'+pi">
                                            <tr style="border-top:1px solid #333;">
                                                <td style="padding:4px 6px;color:var(--gold-light);font-weight:600;font-size:11px;" x-text="player.name + (pi===0 ? ' ★' : '')"></td>
                                                <template x-for="h in 9" :key="'ssf'+h">
                                                    <td style="text-align:center;padding:4px 3px;" :style="{color: spectatingState.scores[h-1][pi] === null ? 'var(--gray-400)' : spectatingState.scores[h-1][pi] < spectatingState.holeData[h-1].par ? 'var(--green)' : spectatingState.scores[h-1][pi] === spectatingState.holeData[h-1].par ? 'var(--white)' : spectatingState.scores[h-1][pi] === spectatingState.holeData[h-1].par + 1 ? 'var(--gold-light)' : 'var(--red)'}" x-text="spectatingState.scores[h-1][pi] !== null ? spectatingState.scores[h-1][pi] : '–'"></td>
                                                </template>
                                                <td style="text-align:center;padding:4px 4px;color:var(--gold);font-weight:700;" x-text="(() => { let t=0,has=false; for(let i=0;i<9;i++){if(spectatingState.scores[i][pi]!==null){t+=spectatingState.scores[i][pi];has=true;}} return has?t:'–'; })()"></td>
                                                <template x-for="h in 9" :key="'ssb'+h">
                                                    <td style="text-align:center;padding:4px 3px;" :style="{color: spectatingState.scores[h+8][pi] === null ? 'var(--gray-400)' : spectatingState.scores[h+8][pi] < spectatingState.holeData[h+8].par ? 'var(--green)' : spectatingState.scores[h+8][pi] === spectatingState.holeData[h+8].par ? 'var(--white)' : spectatingState.scores[h+8][pi] === spectatingState.holeData[h+8].par + 1 ? 'var(--gold-light)' : 'var(--red)'}" x-text="spectatingState.scores[h+8][pi] !== null ? spectatingState.scores[h+8][pi] : '–'"></td>
                                                </template>
                                                <td style="text-align:center;padding:4px 4px;color:var(--gold);font-weight:700;" x-text="(() => { let t=0,has=false; for(let i=9;i<18;i++){if(spectatingState.scores[i][pi]!==null){t+=spectatingState.scores[i][pi];has=true;}} return has?t:'–'; })()"></td>
                                                <td style="text-align:center;padding:4px 4px;color:var(--gold);font-weight:800;" x-text="(() => { let t=0,has=false; for(let i=0;i<18;i++){if(spectatingState.scores[i][pi]!==null){t+=spectatingState.scores[i][pi];has=true;}} return has?t:'–'; })()"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Active Games & Money -->
                            <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #333;">
                                <div style="font-weight:700;color:var(--gold);font-size:13px;margin-bottom:10px;">Games Active</div>
                                <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px;">
                                    <span x-show="spectatingState.games?.nassau" style="padding:4px 10px;border-radius:6px;background:var(--gold-dark);color:var(--black);font-weight:600;">Nassau</span>
                                    <span x-show="spectatingState.games?.team" style="padding:4px 10px;border-radius:6px;background:var(--gold-dark);color:var(--black);font-weight:600;">Team</span>
                                    <span x-show="spectatingState.games?.points" style="padding:4px 10px;border-radius:6px;background:var(--gold-dark);color:var(--black);font-weight:600;">Points</span>
                                </div>
                            </div>

                            <!-- Player Positions -->
                            <div style="background:var(--black-light);border-radius:12px;padding:14px;border:1px solid #333;">
                                <div style="font-weight:700;color:var(--gold);font-size:13px;margin-bottom:10px;">Player Positions</div>
                                <template x-for="(pp, idx) in spectatingState._playerPositions || []" :key="'pp'+idx">
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid #333;font-size:13px;">
                                        <span style="color:var(--white);font-weight:500;" x-text="pp.name + (idx===0 ? ' ★' : '')"></span>
                                        <span style="font-weight:700;" :style="{color: pp.amount > 0 ? 'var(--green)' : pp.amount < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(pp.amount > 0 ? '+$' : pp.amount < 0 ? '-$' : '$') + Math.abs(pp.amount)"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- SETUP SCREEN -->
            <template x-if="currentScreen === 'setup'">
                <div class="setup-screen">
                    <div class="setup-section">
                        <div class="setup-section-title">Player Count</div>
                        <div class="player-count-toggle">
                            <button class="toggle-btn" :class="{ active: playerCount === 3 }" @click="setPlayerCount(3)">3 Players</button>
                            <button class="toggle-btn" :class="{ active: playerCount === 4 }" @click="setPlayerCount(4)">4 Players</button>
                            <button class="toggle-btn" :class="{ active: playerCount === 5 }" @click="setPlayerCount(5)">5 Players</button>
                        </div>

                        <div class="player-input-group">
                            <div class="player-input-row" style="margin-bottom: 4px;">
                                <span style="flex: 1; font-size: 11px; color: var(--gold-light); font-weight: 600;">Name</span>
                                <span style="width: 60px; text-align: center; font-size: 11px; color: var(--gold-light); font-weight: 600;">HCP</span>
                            </div>
                            <template x-for="(player, idx) in players.slice(0, playerCount)" :key="idx">
                                <div class="player-input-row">
                                    <input type="text" x-model="players[idx].name" placeholder="Player name" style="flex: 1;">
                                    <input type="number" x-model.number="players[idx].handicap" placeholder="HCP" class="handicap-input" min="0" max="54">
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="setup-section">
                        <div class="setup-section-title">Course</div>
                        <div style="margin-bottom: 8px;">
                            <select style="width: 100%; padding: 10px 12px; background: var(--dark-card); color: var(--white); border: 1px solid var(--gold-dark); border-radius: 8px; font-size: 14px; appearance: auto; cursor: pointer;" x-model="courseName" @change="setCourse($event.target.value)">
                                <option value="" disabled selected>Select Course</option>
                                <template x-for="cName in Object.keys(COURSES).sort()" :key="cName">
                                    <option :value="cName" x-text="cName"></option>
                                </template>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                        <div class="setup-section-title" style="margin-top: 4px;">Tees</div>
                        <div class="tee-buttons-row" x-show="courseName !== 'Custom' && courseName !== ''">
                            <template x-for="tKey in getCourseTeeKeys()" :key="tKey">
                                <button class="toggle-btn" :class="{ active: teeName === tKey }" @click="setTees(tKey)" x-text="tKey"></button>
                            </template>
                        </div>
                        <template x-if="courseName === 'Custom'">
                            <div style="margin-top: 8px;">
                                <div style="display: flex; gap: 8px; margin-bottom: 10px; align-items: center;">

                                        </tr>
                                        <tr>
                                            <td style="padding: 2px 4px; color: var(--gold-light); font-weight: 600;">HCP</td>

                                            </template>
                                        </tr>
                                        <tr style="color: var(--gold-light); border-top: 1px solid var(--gold-dark);">
                                            <td style="padding: 4px 4px 2px; font-weight: 700;">Hole</td>
                                            <template x-for="h in 9" :key="'cf2'+h">
                                                <td style="padding: 4px 2px 2px; text-align: center; font-weight: 700;" x-text="h+9"></td>
                                            </template>
                                        </tr>
                                        <tr>
                                            <td style="padding: 2px 4px; color: var(--gold-light); font-weight: 600;">Par</td>
                                            <template x-for="h in 9" :key="'cp2'+h">
                                                <td style="padding: 2px;"><input type="number" min="3" max="5" style="width: 100%; padding: 4px 2px; background: var(--dark-bg); color: var(--white); border: 1px solid var(--gold-dark); border-radius: 4px; text-align: center; font-size: 12px;" :value="customPars[h+8]" @input="customPars[h+8] = parseInt($event.target.value) || 4; applyCustomCourse()"></td>
                                            </template>
                                        </tr>
                                        <tr>
                                            <td style="padding: 2px 4px; color: var(--gold-light); font-weight: 600;">HCP</td>
                                            <template x-for="h in 9" :key="'ch2'+h">
                                                <td style="padding: 2px;"><input type="number" min="1" max="18" style="width: 100%; padding: 4px 2px; background: var(--dark-bg); color: var(--white); border: 1px solid var(--gold-dark); border-radius: 4px; text-align: center; font-size: 12px;" :value="customHcps[h+8]" @input="customHcps[h+8] = parseInt($event.target.value) || (h+9); applyCustomCourse()"></td>

                                        </tr>
                                    </table>
                                </div>
                            </div>
                        </template>
                        <div x-show="courseName === ''" style="font-size: 12px; color: var(--gold-light);">Please select a course to continue.</div>

                    <div class="setup-section">
                        <div class="setup-section-title">Game Selection</div>
                        <div class="game-toggles">
                            <div class="toggle-item">
                                <div class="toggle-switch" :class="{ on: games.nassau }" @click="toggleGame('nassau')"></div>
                                <span style="font-size: 14px;">Indies (Head-to-Head)</span>
                            </div>
                            <div class="toggle-item">
                                <div class="toggle-switch" :class="{ on: games.team }" @click="toggleGame('team')"></div>
                                <span style="font-size: 14px;">Team Game</span>
                            </div>
                            <div class="toggle-item">
                                <div class="toggle-switch" :class="{ on: games.points }" @click="toggleGame('points')"></div>
                                <span style="font-size: 14px;">Points Game</span>
                            </div>
                        </div>
                    </div>

                    <div class="setup-section">
                        <div class="setup-section-title">Bet Amounts</div>
                        <template x-if="games.nassau">
                            <div class="bet-amounts">
                                <div style="font-size: 12px; color: var(--gold-light); margin-bottom: 6px;">Indies Bets (Head-to-Head)</div>

                                    <button class="toggle-btn" :class="{ active: nassauPressMode === 'auto' }" @click="nassauPressMode = 'auto'; saveState()">Auto Presses</button>

                                </div>
                                <div x-show="nassauPressMode === 'aloha'" style="font-size: 11px; color: var(--gold-light); margin-bottom: 8px;">No auto presses. When closed out on overall 18, aloha press at half the bet through H18.</div>

                                    <div class="bet-input-group">
                                        <span class="bet-label" x-text="`${players[pair.a].name} vs ${players[pair.b].name}`"></span>
                                        <input type="number" :value="getPairBet(pair.a, pair.b)" @input="setPairBet(pair.a, pair.b, +$event.target.value)" min="1" placeholder="$20" style="flex: 1;">
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template x-if="games.team">
                            <div class="bet-amounts">
                                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                    <button class="toggle-btn" :class="{ active: teamFormat === 'straight' }" @click="teamFormat = 'straight'; saveState()">Straight</button>
                                    <button class="toggle-btn" :class="{ active: teamFormat === 'nassau' }" @click="teamFormat = 'nassau'; saveState()">Nassau</button>
                                </div>
                                <div class="bet-input-group">
                                    <span class="bet-label">Denomination</span>
                                    <input type="number" x-model.number="teamBet" min="1" placeholder="$25" style="flex: 1;">
                                </div>
                                <div x-show="teamFormat === 'straight'" style="font-size: 11px; color: var(--gold-light); margin-top: 4px;" x-text="`First bet = $${teamBet * 2} (2x), Presses = $${teamBet}`"></div>
                                <div x-show="teamFormat === 'nassau'" style="font-size: 11px; color: var(--gold-light); margin-top: 4px;" x-text="`Front 3 = $${teamBet}, Back 3 = $${teamBet}, Overall = $${teamBet * 2} (2x), Presses = $${teamBet}`"></div>
                                <template x-if="playerCount === 3">
                                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gold-dark);">
                                        <div style="display: flex; align-items: center; gap: 10px;">
                                            <div class="toggle-switch" :class="{ on: useTeamPro }" @click="toggleTeamPro()"></div>
                                            <span style="font-size: 13px;">Add Pro (scratch 0 HCP)</span>
                                        </div>
                                        <div style="font-size: 11px; color: var(--gold-light); margin-top: 4px;">Phantom 4th player shoots par every hole. Teams only — not in Indies or Points.</div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template x-if="games.points">
                            <div class="bet-amounts">
                                <div class="bet-input-group">
                                    <span class="bet-label">Denomination</span>
                                    <input type="number" x-model.number="pointsBet" min="0.01" step="0.01" placeholder="$2" style="flex: 1;">
                                </div>
                                <div style="font-size: 11px; color: var(--gold-light); margin-top: 4px;" x-text="`= $${(pointsBet || 1) * playerCount} per point (${playerCount} players × $${pointsBet || 1})`"></div>
                            </div>
                        </template>
                    </div>

                    <template x-if="games.team">

                                    <button class="player-button unassigned" @click="togglePlayerTeam(0, playerIdx)" x-text="players[playerIdx].name"></button>
                                </template>
                                <template x-if="teamSegments.length > 0">
                                    <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gold-dark); display: flex; gap: 16px;">

                                            <div class="team-title">Box</div>
                                            <template x-for="playerIdx in teamSegments[0].box" :key="playerIdx">
                                                <button class="player-button team-box" @click="togglePlayerTeam(0, playerIdx)" x-text="players[playerIdx].name"></button>
                                            </template>
                                            <div x-show="teamSegments[0].box.length === 0" style="font-size: 11px; color: var(--gray-400); padding: 6px;">—</div>
                                        </div>
                                        <div style="flex: 1;">
                                            <div class="team-title">Opponents</div>
                                            <template x-for="playerIdx in teamSegments[0].opponents" :key="playerIdx">
                                                <button class="player-button team-opp" @click="togglePlayerTeam(0, playerIdx)" x-text="players[playerIdx].name"></button>
                                            </template>
                                            <div x-show="teamSegments[0].opponents.length === 0" style="font-size: 11px; color: var(--gray-400); padding: 6px;">—</div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <button x-show="!roundStarted" class="start-button" @click="startRound()">Start Round</button>

                        <button class="start-button" @click="returnToRound()" style="background-color: var(--green); color: var(--white);">← Return to Round</button>
                        <div style="font-size:11px;color:var(--gold-light);text-align:center;">Changes to handicaps and bets will take effect immediately. Scores are preserved.</div>
                    </div>

                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <button @click="loadHistory(); currentScreen='history'" style="flex:1;padding:10px;border-radius:10px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:13px;font-weight:600;cursor:pointer;">📜 Round History</button>
                        <template x-if="isAdmin">
                            <button @click="loadAdminUsers(); showAdminPanel=true" style="flex:1;padding:10px;border-radius:10px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:13px;font-weight:600;cursor:pointer;">⚙️ Admin</button>
                        </template>
                    </div>

                    <!-- Admin Panel -->
                    <template x-if="showAdminPanel">
                        <div style="margin-top:16px;padding:12px;border:1px solid var(--gold-dark);border-radius:8px;background:var(--black);">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                <div style="font-weight:700;color:var(--gold);font-size:13px;">Admin Panel</div>
                                <button @click="showAdminPanel=false" style="background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:16px;">✕</button>
                            </div>
                            <!-- Live Games Button -->
                            <button @click="loadLiveGames(); currentScreen='liveGames'; showAdminPanel=false" style="width:100%;padding:10px;border-radius:8px;background:var(--green-dark,#1a9c54);color:var(--white);font-weight:700;border:none;font-size:13px;cursor:pointer;margin-bottom:12px;">📡 Live Games</button>

                            <div style="font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;margin-bottom:6px;">Users</div>
                            <div style="max-height:200px;overflow-y:auto;">
                                <template x-for="user in adminUsers" :key="user.id">
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--gold-dark);font-size:12px;color:var(--white);">
                                        <span><span x-text="user.user_name" style="color:var(--gold-light);font-weight:600;"></span><span x-show="user.is_admin" style="margin-left:4px;color:var(--gold);font-size:10px;font-weight:700;">(ADMIN)</span></span>
                                        <button @click="resetUserPin(user.id, user.user_name)" style="padding:4px 8px;border-radius:4px;background:var(--black-light);color:var(--gold);border:1px solid var(--gold-dark);font-size:11px;cursor:pointer;">Reset PIN</button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div x-show="loggedInUser" style="text-align:center;margin-top:16px;font-size:11px;color:var(--gray-400);">
                        Logged in as <span x-text="loggedInUser" style="color:var(--gold-light);"></span>
                        <button @click="doLogout()" style="margin-left:8px;background:none;border:none;color:var(--gray-400);text-decoration:underline;font-size:11px;cursor:pointer;">Logout</button>
                    </div>
                    <div x-show="cloudSaving" style="text-align:center;margin-top:8px;font-size:11px;color:var(--gold-dark);">☁️ Saving to cloud...</div>
                </div>
            </template>

            <!-- SCORE ENTRY SCREEN -->
            <template x-if="currentScreen === 'scoreEntry'">
                <div class="score-entry-screen">
                    <div class="score-entry-header">
                        <div class="hole-info">
                            <div class="hole-number" x-text="`Hole ${currentHoleNumber}`"></div>
                            <div class="hole-detail" x-text="`Par ${currentPar} • ${holeData[holeIndex].yards || ''} yds • HCP ${currentHcp}`"></div>
                        </div>
                        <div class="position-summary">
                            <div class="position-label">Position</div>
                            <div class="position-value" :class="{ positive: currentPosition >= 0, negative: currentPosition < 0 }" x-text="formatMoney(currentPosition)"></div>
                        </div>
                    </div>

                    <div class="score-entry-content">
                        <template x-for="(player, idx) in players.slice(0, playerCount)" :key="idx">
                            <div class="player-score-card">
                                <div class="player-header">
                                    <div class="player-name" x-text="player.name"></div>

                                        <div class="stroke-indicator">+1 STROKE</div>
                                    </template>
                                </div>
                                <div class="score-input-row">
                                    <button class="score-button" @click="changeScore(idx, -1)">−</button>
                                    <div class="score-display" x-text="scores[holeIndex][idx] !== null ? scores[holeIndex][idx] : currentPar"></div>
                                    <button class="score-button" @click="changeScore(idx, 1)">+</button>
                                </div>
                            </div>
                        </template>

                        <div class="score-nav">

                        </div>
                        <div style="text-align:center;margin-top:12px;display:flex;justify-content:center;gap:16px;">
                            <button @click="editSetup()" style="background:none;border:none;color:var(--gold-dark);text-decoration:underline;font-size:12px;cursor:pointer;">✏️ Edit Setup</button>
                            <button @click="resetRound()" style="background:none;border:none;color:var(--gold-dark);text-decoration:underline;font-size:12px;cursor:pointer;">🔄 Reset Round</button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- SUMMARY SCREEN -->
            <template x-if="currentScreen === 'summary'">
                <div class="results-screen">

                    </div>

                    <!-- Full breakdown per player -->
                    <template x-for="(player, pi) in players.slice(0, playerCount)" :key="'sb'+pi">
                        <div class="summary-box">
                            <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" @click="$data['_expandSummary'+pi] = !$data['_expandSummary'+pi]">

                                </div>
                            </div>

                                <div style="margin-top:8px;border-top:1px solid var(--gold-dark);padding-top:8px;">

                                                        <span class="summary-player-name" style="font-size:12px;" x-text="'vs ' + players[opi-1].name"></span>
                                                        <span class="summary-amount" style="font-size:12px;" :class="{ positive: getIndieVs(pi, opi-1) > 0, negative: getIndieVs(pi, opi-1) < 0 }" x-text="formatMoney(getIndieVs(pi, opi-1))"></span>
                                                    </div>
                                                </template>
                                            </template>
                                            <div class="summary-item" style="padding:2px 0;border-top:1px solid var(--gray-700);">
                                                <span class="summary-player-name" style="font-size:12px;font-weight:700;">Indies Total</span>
                                                <span class="summary-amount" style="font-size:12px;font-weight:700;" :class="{ positive: getPlayerNassauTotal(pi) > 0, negative: getPlayerNassauTotal(pi) < 0 }" x-text="formatMoney(getPlayerNassauTotal(pi))"></span>
                                            </div>
                                        </div>
                                    </template>
                                    <!-- Team breakdown -->
                                    <template x-if="games.team">
                                        <div class="summary-item" style="margin-bottom:4px;">
                                            <span class="summary-player-name" style="font-size:12px;">Team Game</span>
                                            <span class="summary-amount" style="font-size:12px;" :class="{ positive: getPlayerTeamTotal(pi) > 0, negative: getPlayerTeamTotal(pi) < 0 }" x-text="formatMoney(getPlayerTeamTotal(pi))"></span>
                                        </div>
                                    </template>
                                    <!-- Points breakdown -->
                                    <template x-if="games.points">
                                        <div class="summary-item" style="margin-bottom:4px;">
                                            <span class="summary-player-name" style="font-size:12px;">Points Game</span>

                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <div x-show="!viewingHistory" style="display:flex;flex-direction:column;gap:8px;">

                        <div x-show="cloudSaving" style="text-align:center;padding:10px;color:var(--gold-dark);font-size:13px;">Saving...</div>
                        <button class="start-button" @click="editSetup()" style="background-color: var(--green); color: var(--white);">✏️ Edit Setup</button>
                        <button class="start-button" @click="resetRound()" style="background-color: var(--gold); color: var(--black);">🔄 Reset Round</button>
                        <button class="start-button" @click="newRound()" style="background-color: var(--gray-700); color: var(--white);">New Round</button>
                    </div>
                    <div x-show="viewingHistory" style="display:flex;flex-direction:column;gap:8px;text-align:center;">
                        <button class="start-button" @click="editCompletedRound(cloudRoundId || spectatingRound)" x-show="cloudRoundId || spectatingRound" style="background-color: var(--gold); color: var(--black);">✏️ Edit This Round</button>
                        <button class="start-button" @click="exitHistoryView()" style="background-color: var(--gold-dark); color: var(--black);">← Back to History</button>
                    </div>
                </div>
            </template>

            <!-- SCORECARD SCREEN -->
            <template x-if="currentScreen === 'scorecard'">
                <div class="results-screen">
                    <div class="scorecard-container">
                        <table class="scorecard-table">

                                <tr>
                                    <th style="min-width: 80px;">Player</th>

                                        <th x-text="`${h + 9}`"></th>
                                    </template>
                                    <th style="background-color: var(--gold-dark);">IN</th>
                                    <th style="background-color: var(--gold-dark); font-weight: 800;">TOTAL</th>
                                </tr>
                                <tr>
                                    <th>Par</th>
                                    <template x-for="h in 9" :key="'pf'+h">
                                        <td class="subtotal" x-text="holeData[h-1].par"></td>

                                    <td class="subtotal" x-text="holeData.slice(0, 9).reduce((a, b) => a + b.par, 0)"></td>
                                    <template x-for="h in 9" :key="'pb'+h">
                                        <td class="subtotal" x-text="holeData[h+8].par"></td>
                                    </template>
                                    <td class="subtotal" x-text="holeData.slice(9).reduce((a, b) => a + b.par, 0)"></td>
                                    <td class="subtotal" x-text="holeData.reduce((a, b) => a + b.par, 0)"></td>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(player, pIdx) in players.slice(0, playerCount)" :key="pIdx">
                                    <tr>
                                        <td class="player-label" x-text="player.name"></td>
                                        <template x-for="h in 9" :key="'sf'+h">
