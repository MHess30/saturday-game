    <!--

    CREATE TABLE saturday_bets_users (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT UNIQUE NOT NULL,
        pin_hash TEXT NOT NULL,
        email TEXT,
        is_admin BOOLEAN DEFAULT false
    );

    ALTER TABLE saturday_bets_users ENABLE ROW LEVEL SECURITY;

    -- Users: anyone can read & create accounts
    CREATE POLICY "Allow select for anon" ON saturday_bets_users
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_users
        FOR INSERT WITH CHECK (true);
    -- Only the user themselves (or admin) can update their own row
    CREATE POLICY "Allow update own or admin" ON saturday_bets_users
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete users
    CREATE POLICY "Admin delete only" ON saturday_bets_users
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );

    CREATE TABLE saturday_bets_rounds (
        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW(),
        user_name TEXT NOT NULL,
        date DATE NOT NULL,
        course TEXT DEFAULT 'El Caballero',
        tees TEXT,
        status TEXT DEFAULT 'in_progress',
        player_names TEXT[],
        total_winnings NUMERIC DEFAULT 0,
        state JSONB NOT NULL
    );

    CREATE INDEX idx_bets_user ON saturday_bets_rounds(user_name);
    CREATE INDEX idx_bets_date ON saturday_bets_rounds(date DESC);
    CREATE INDEX idx_bets_status ON saturday_bets_rounds(status);

    ALTER TABLE saturday_bets_rounds ENABLE ROW LEVEL SECURITY;

    -- Rounds: anyone can read & create
    CREATE POLICY "Allow select for anon" ON saturday_bets_rounds
        FOR SELECT USING (true);
    CREATE POLICY "Allow insert for anon" ON saturday_bets_rounds
        FOR INSERT WITH CHECK (true);
    -- Only the round owner (or admin) can update
    CREATE POLICY "Allow update own or admin" ON saturday_bets_rounds
        FOR UPDATE USING (
            user_name = current_setting('request.jwt.claims', true)::json->>'user_name'
            OR EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -- Only admin can delete rounds
    CREATE POLICY "Admin delete only" ON saturday_bets_rounds
        FOR DELETE USING (
            EXISTS (SELECT 1 FROM saturday_bets_users WHERE user_name = current_setting('request.jwt.claims', true)::json->>'user_name' AND is_admin = true)
        );
    -->

    <style>
        :root {
            --black: #0A1520;
            --black-light: #0F1E2D;
            --gold: #C9A84C;
            --gold-light: #e8d48b;
            --gold-dark: #a08830;
            --gold-pale: #2A2200;
            --white: #E8ECF0;
            --gray-100: #162336;
            --gray-200: #1E3048;
            --gray-400: #8A9BB0;
            --gray-700: #6B7D8F;
            --green: #66BB6A;
            --green-dark: #2E7D32;
            --red: #CC3300;
            --red-light: #2A0A0A;
            --dark-bg: #0A1520;

            overflow: hidden;
        }

            flex-direction: column;
        }

            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

            overflow-y: auto;

            gap: 8px;
        }

            gap: 8px;

            color: var(--white);

            border-radius: 4px;

        .tee-buttons-row {

            gap: 6px;
            margin-bottom: 8px;
        }

        .bet-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bet-label {
            font-size: 12px;
            color: var(--gold-light);
            min-width: 80px;
            flex: 1;
        }

        .bet-input-group input {
            width: 80px;
            background-color: var(--black);
            border: 1px solid var(--gray-200);
            color: var(--white);
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
            text-align: center;
        }

        .toggle-btn {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid #2D4A60;
            color: var(--gray-400);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: var(--green-dark);
            color: #FFFFFF;
            border-color: var(--green);
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            border-radius: 12px;
            background-color: var(--gray-700);
            border: 2px solid var(--gray-400);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--white);
            top: 3px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.on {
            background-color: var(--green);
            border-color: var(--green-dark);
        }

        .toggle-switch.on::after {
            left: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-toggles {
            flex-direction: column;
            gap: 12px;
        }

        .bet-amounts {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }


        /* Game Card Layout */
        .game-card-setup { background: var(--card-bg); border: 1px solid var(--gray-200); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .game-card-setup.gc-active { border-color: var(--green-dark); }
        .gc-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
        .gc-name { font-size: 15px; font-weight: 700; color: var(--white); }

        .gc-config { padding: 0 16px 16px; }

        .gc-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

        .gc-pill.gc-selected { background: var(--green); border-color: var(--green); color: white; }
        .gc-hint { font-size: 11px; color: var(--gray-400); line-height: 1.4; margin-top: -4px; margin-bottom: 12px; padding: 6px 8px; background: rgba(15,26,46,0.5); border-radius: 6px; font-style: italic; }
        .gc-divider { height: 1px; background: var(--gray-200); margin: 12px 0; }
        .gc-matchup-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; }
        .gc-matchup-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(42,58,82,0.5); }
        .gc-matchup-row:last-child { border-bottom: none; }
        .gc-matchup-name { font-size: 13px; color: var(--gold-light); }
        .gc-input { width: 56px; padding: 6px; background: var(--navy); border: 1px solid var(--gray-200); border-radius: 6px; color: white; font-size: 14px; text-align: center; font-weight: 600; }
        .gc-off-hint { padding: 0 16px 12px; font-size: 11px; color: var(--gray-400); font-style: italic; }
        .gc-denom-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        .gc-denom-label { font-size: 14px; font-weight: 600; color: var(--white); }
        .gc-denom-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; line-height: 1.4; }

        .points-cell-points {
            color: var(--gold);
            font-weight: 600;
        }

        .points-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .points-summary-item {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .points-summary-label {
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .points-summary-value {
            font-size: 18px;
            font-weight: 700;
        }

        .points-summary-value.positive {
            color: var(--green);
        }

        .points-summary-value.negative {
            color: var(--red);
        }

        /* SUMMARY SCREEN */
        .summary-header {
            text-align: center;
            padding: 20px 12px;
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--green-dark);
        }

        .summary-total {
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 6px;
        }

        .summary-amount {
            font-size: 36px;
            font-weight: 800;
            margin-top: 4px;
        }

        .summary-amount.positive {
            color: var(--green);
        }

        .summary-amount.negative {
            color: var(--red);
        }

        .summary-box {
            background-color: var(--card-bg);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .summary-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-player-name {
            color: var(--gold-light);
            font-weight: 600;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--navy2);
            border-top: 2px solid var(--green-dark);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            flex: 1;
            height: 100%;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-icon.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        /* HOW TO PLAY MODAL */
        .htp-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 20px 12px; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .htp-modal {
            background: var(--navy2); border: 1px solid var(--green-dark); border-radius: 16px;
            width: 100%; max-width: 480px; padding: 20px 16px 24px; position: relative;
        }
        .htp-close {
            position: absolute; top: 10px; right: 14px; background: none; border: none;
            color: var(--gray-400); font-size: 22px; cursor: pointer; padding: 4px;
        }
        .htp-title {
            font-size: 18px; font-weight: 700; color: var(--gold); text-align: center;
            margin-bottom: 16px;
        }
        .htp-game {
            margin-bottom: 16px; padding: 12px; background: var(--card-bg);
            border-radius: 10px; border: 1px solid var(--gray-200);
        }
        .htp-game-title {
            font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 6px;
        }
        .htp-game p {
            font-size: 12px; color: var(--gold-light); line-height: 1.5; margin: 0 0 6px;
        }
        .htp-game p:last-child { margin-bottom: 0; }
        .htp-fab {
            position: fixed; bottom: 70px; right: 12px; z-index: 90;
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--green-dark);
            background: var(--navy2); color: var(--gold); font-size: 16px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* UTILITIES */
        .expandable {
            user-select: none;
        }

        .expandable::after {
            content: ' ▼';
            font-size: 10px;
        }

        .expandable.expanded::after {
            content: ' ▲';
        }

        .score-cell {
            position: relative;
        }

        /* Score decorations: birdie=circle, bogey=square, double+=double square */
        .score-birdie {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-bogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;
            border: 1.5px solid var(--white); line-height: 1;
        }
        .score-dblbogey {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 2px;
            border: 1.5px solid var(--white); line-height: 1;
            outline: 1.5px solid var(--white); outline-offset: 2px;
        }
        .score-eagle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--white); line-height: 1;
            outline: 1.5px solid var(--white); outline-offset: 2px;
        }

        .has-stroke { position: relative; }
        .has-stroke::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--red);
        }
        .has-stroke-2 { position: relative; }
        .has-stroke-2::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 1px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--red);
        }
        .has-stroke-2::before {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 8px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--red);
        }

        [x-cloak] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container" x-data="saturdayBets()" x-init="init()" x-cloak>

        <!-- LOGIN OVERLAY -->
        <template x-if="showLogin">
            <div style="position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;">
                <div style="background:var(--card-bg);border:1px solid var(--gray-200);border-radius:16px;padding:32px;width:300px;">
                    <div style="text-align:center;margin-bottom:24px;">
                        <div style="font-size:28px;margin-bottom:4px;">⛳</div>
                        <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px;">Side Action</div>
                        <div style="font-size:11px;color:var(--gray-400);letter-spacing:1px;">Where Every Round Counts.</div>
                    </div>

                    <!-- Mode Tabs -->
                    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--gray-200);">
                        <button @click="loginMode='login'" :style="'flex:1;padding:10px;border:none;background:none;color:' + (loginMode==='login' ? 'var(--gold)' : 'var(--gray-400)') + ';font-weight:' + (loginMode==='login' ? '700' : '400') + ';font-size:13px;cursor:pointer;border-bottom:' + (loginMode==='login' ? '2px solid var(--gold)' : 'none') + ';margin-bottom:-1px;'">Login</button>
                        <button @click="loginMode='register'" :style="'flex:1;padding:10px;border:none;background:none;color:' + (loginMode==='register' ? 'var(--gold)' : 'var(--gray-400)') + ';font-weight:' + (loginMode==='register' ? '700' : '400') + ';font-size:13px;cursor:pointer;border-bottom:' + (loginMode==='register' ? '2px solid var(--gold)' : 'none') + ';margin-bottom:-1px;'">New Account</button>
                    </div>

                    <!-- Login Mode -->
                    <template x-if="loginMode === 'login'">
                        <div style="text-align:center;">
                            <div style="font-size:12px;color:var(--gray-400);margin-bottom:16px;">Enter your name & PIN</div>
                            <input type="text" x-model="loginName" placeholder="Your name" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gray-200);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;">
                            <input type="tel" x-model="loginPin" placeholder="4-digit PIN" maxlength="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gray-200);background:var(--black);color:var(--white);font-size:14px;margin-bottom:8px;box-sizing:border-box;" @keyup.enter="doLogin()">
                            <div x-show="loginError" x-text="loginError" style="color:var(--red);font-size:11px;margin-bottom:8px;"></div>
                            <button @click="doLogin()" :disabled="loginLoading" style="width:100%;padding:10px;border-radius:8px;background:var(--green-dark);color:#FFFFFF;font-weight:700;border:none;font-size:14px;cursor:pointer;margin-top:8px;opacity:" + (loginLoading ? '0.6' : '1') + ";" x-text="loginLoading ? 'Logging in...' : 'Login'"></button>
                            <div style="margin-top:12px;">
                                <button @click="loginError='Contact the admin (Michael) to reset your PIN.'" style="background:none;border:none;color:var(--gray-400);text-decoration:underline;font-size:11px;cursor:pointer;">Forgot PIN?</button>
                            </div>
                        </div>
                    </template>

                    <!-- Register Mode -->
                    <template x-if="loginMode === 'register'">
                        <div style="text-align:center;">
                            <div style="font-size:13px;color:var(--gray-400);margin-bottom:16px;line-height:1.6;">
                                Create your free account at<br>
                                <strong style="color:var(--gold);">floggames.com</strong>
                            </div>
                            <div style="font-size:12px;color:var(--gray-400);margin-bottom:16px;line-height:1.5;">
                                Sign up with your email and password,<br>then come back here to log in.
                            </div>
                            <a href="https://floggames.com/signup/" style="display:inline-block;padding:12px 28px;border-radius:8px;background:var(--gold);color:var(--navy);font-weight:700;font-size:14px;text-decoration:none;cursor:pointer;">Sign Up</a>
                            <div style="margin-top:16px;">
                                <button @click="loginMode='login'" style="background:none;border:none;color:var(--gray-400);text-decoration:underline;font-size:11px;cursor:pointer;">Already have an account? Log in</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- HISTORY VIEW BANNER -->
        <template x-if="viewingHistory">
            <div style="position:fixed;top:0;left:0;right:0;z-index:100;background:var(--green-dark);color:#FFFFFF;text-align:center;padding:8px;font-weight:700;font-size:13px;">
                Viewing Past Round <button @click="exitHistoryView()" style="margin-left:12px;padding:4px 12px;border-radius:6px;background:var(--navy);color:var(--gold);border:none;font-size:12px;font-weight:600;cursor:pointer;">← Back</button>
            </div>
        </template>

        <div class="main-content">
            <!-- BACK TO LOBBY (FLOG only — other clubs don't have a lobby) -->
            <div x-show="!showLogin && !viewingHistory && clubSlug === 'flog'" style="padding:10px 16px 0;">
                <a href="https://floggames.com/" style="color:var(--gold);text-decoration:none;font-size:13px;font-weight:600;letter-spacing:0.5px;">← Return to Lobby</a>
            </div>

            <!-- BACK TO SETUP (visible during active play on all gameplay tabs) -->
            <div x-show="roundStarted && currentScreen !== 'setup' && !showLogin && !viewingHistory && !isReadOnly" style="padding:8px 16px 0;">
                <button @click="goToScreen('setup')" style="background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;padding:0;letter-spacing:0.3px;">⚙️ Back to Setup</button>
            </div>

            <!-- HISTORY SCREEN -->
            <template x-if="currentScreen === 'history'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div style="font-size:18px;font-weight:700;color:var(--gold);">Round History</div>
                        <button @click="currentScreen='setup'" style="padding:6px 14px;border-radius:8px;background:var(--card-bg);color:var(--gold);border:1px solid var(--gray-200);font-size:12px;cursor:pointer;">← Back</button>
                    </div>
                    <div x-show="historyLoading" style="text-align:center;color:var(--gray-400);padding:40px 0;">Loading...</div>
                    <div x-show="!historyLoading && roundHistory.length === 0" style="text-align:center;color:var(--gray-400);padding:40px 0;">No past rounds found</div>
                    <template x-for="round in roundHistory" :key="round.id">
                        <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--gray-200);">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <div style="font-weight:700;color:var(--white);font-size:14px;" x-text="new Date(round.date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="round.course + ' · ' + round.tees"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="(round.player_names || []).join(', ')"></div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:16px;font-weight:700;" :style="{color: round.total_winnings > 0 ? 'var(--green)' : round.total_winnings < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(round.total_winnings > 0 ? '+$' : round.total_winnings < 0 ? '-$' : '$') + Math.abs(round.total_winnings || 0)"></div>
                                    <div style="font-size:10px;color:var(--gray-400);margin-top:2px;" :style="{color: round.status === 'finalized' ? 'var(--green)' : 'var(--gray-400)'}" x-text="round.status === 'finalized' ? '🔒 Finalized' : round.status === 'completed' ? 'Completed' : 'In Progress'"></div>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button @click="loadRoundFromCloud(round.id)" style="flex:1;padding:8px;border-radius:8px;background:var(--green-dark);color:#FFFFFF;font-weight:600;border:none;font-size:12px;cursor:pointer;" x-text="round.status === 'in_progress' ? 'Resume' : 'View'"></button>
                                <button x-show="(round.status === 'completed' || round.status === 'finalized') && !isReadOnly" @click="editCompletedRound(round.id)" style="padding:8px 12px;border-radius:8px;background:var(--card-bg);color:var(--gold);border:1px solid var(--gray-200);font-size:12px;cursor:pointer;">✏️ Edit</button>
                                <button x-show="isAdmin" @click="deleteRound(round.id)" style="padding:8px 12px;border-radius:8px;background:#441111;color:var(--red);border:none;font-size:12px;cursor:pointer;">Delete</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- LIVE GAMES SCREEN (Admin) -->
            <template x-if="currentScreen === 'liveGames'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div style="font-size:18px;font-weight:700;color:var(--green,#2ecc71);">📡 Live Games</div>
                        <div style="display:flex;gap:8px;">
                            <button @click="loadLiveGames()" style="padding:6px 12px;border-radius:8px;background:var(--card-bg);color:var(--gold);border:1px solid var(--gray-200);font-size:12px;cursor:pointer;">↻ Refresh</button>
                            <button @click="currentScreen='setup'" style="padding:6px 14px;border-radius:8px;background:var(--card-bg);color:var(--gold);border:1px solid var(--gray-200);font-size:12px;cursor:pointer;">← Back</button>
                        </div>
                    </div>
                    <div x-show="liveGamesLoading" style="text-align:center;color:var(--gray-400);padding:40px 0;">Loading...</div>
                    <div x-show="!liveGamesLoading && liveGames.length === 0" style="text-align:center;color:var(--gray-400);padding:40px 0;">No active games right now</div>
                    <template x-for="game in liveGames" :key="game.id">
                        <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--gray-200);">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <div style="font-weight:700;color:var(--gold-light);font-size:15px;" x-text="game.user_name"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="game.course + ' · ' + (game.tees || '')"></div>
                                    <div style="font-size:11px;color:var(--gray-400);margin-top:2px;" x-text="(game.player_names || []).join(', ')"></div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:16px;font-weight:700;" :style="{color: game.total_winnings > 0 ? 'var(--green)' : game.total_winnings < 0 ? 'var(--red)' : 'var(--gray-400)'}" x-text="(game.total_winnings > 0 ? '+$' :game.total_winnings < 0 ? '-$' :'$') +Math.abs(game.total_winnings || 0)"></div>
                                    <div style="font-size:10px;margin-top:2px;" :style="{color: game.status === 'in_progress' ? 'var(--green)' : 'var(--gray-400)'}" x-text="game.status === 'in_progress' ? '● Live' : 'Completed'"></div>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button @click="spectateRound(game.id, game.user_name)" style="flex:1;padding:8px;border-radius:8px;background:var(--green-dark);color:#FFFFFF;font-weight:600;border:none;font-size:12px;cursor:pointer;">👁️ View Details</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- COMBINED LEADERBOARD VIEW -->
            <template x-if="currentScreen === 'leaderboard'">
                <div class="setup-screen" style="padding-top:16px;">
                    <div x-show="bigTeamEnabled" style="display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--gray-200);">
                        <button @click="loadLeaderboard()" style="flex:1;padding:8px 12px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:var(--green-dark);color:#fff;border-color:var(--green-dark)">Individual</button>
                        <button @click="goToScreen('bigTeam')" style="flex:1;padding:8px 12px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--gold-light);border-color:var(--gray-200)">Big Team</button>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <div>
                            <div style="font-size:18px;font-weight:700;color:var(--gold);">📊 Live Leaderboard</div>
                            <div style="font-size:11px;color:var(--gold-light);margin-top:2px;" x-text="(club?.display_name || 'Saturday Bets') + ' · ' + new Date().toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'})"></div>
                            <div x-show="_liveRefreshInterval" style="font-size:10px;color:var(--green);margin-top:2px;">● Live · Updated <span x-text="leaderboardLastUpdate"></span></div>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button @click="loadLeaderboard()" style="padding:6px 12px;border-radius:8px;background:var(--card-bg);color:var(--gold);border:1px solid var(--gray-200);font-size:12px;cursor:pointer;">↻ Refresh</button>
                            <button x-show="!isReadOnly" @click="shareLeaderboard()" style="padding:6px 12px;border-radius:8px;background:var(--green);color:var(--black);border:none;font-size:12px;cursor:pointer;font-weight:600;">📤 Share</button>
                        </div>
                    </div>

                    <!-- Leaderboard Table -->
                    <div style="background:var(--black-light);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--gray-200);overflow-x:auto;">
                        <table style="width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;">
                            <thead>
                                <tr>
                                    <th style="text-align:left;padding:6px;color:var(--gray-400);font-size:10px;">#</th>
                                    <th style="text-align:left;padding:6px;color:var(--gray-400);font-size:10px;">Player</th>
                                    <th style="text-align:center;padding:6px;color:var(--gray-400);font-size:10px;">HCP</th>
                                    <th style="text-align:center;padding:6px;color:var(--gray-400);font-size:10px;">Thru</th>
                                    <th style="text-align:center;padding:6px;color:var(--gold);font-size:10px;font-weight:700;">OUT</th>
                                    <th style="text-align:center;padding:6px;color:var(--gold);font-size:10px;font-weight:700;">IN</th>
                                    <th @click="sortLeaderboard('net')" style="text-align:center;padding:6px;font-size:10px;font-weight:700;cursor:pointer;" :style="{color: leaderboardSort === 'net' ? 'var(--green)' : 'var(--gold-light)', 'text-decoration': leaderboardSort === 'net' ? 'underline' : 'none'}">NET</th>
                                    <th @click="sortLeaderboard('gross')" style="text-align:center;padding:6px;font-size:10px;font-weight:800;cursor:pointer;" :style="{color: leaderboardSort === 'gross' ? 'var(--green)' : 'var(--gold)', 'text-decoration': leaderboardSort === 'gross' ? 'underline' : 'none'}">TOT</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(p, idx) in leaderboardData" :key="idx">
                                    <tr style="border-top:1px solid var(--gray-200);cursor:pointer;" @click="selectedLeaderboardPlayer = (selectedLeaderboardPlayer && selectedLeaderboardPlayer.roundId === p.roundId && selectedLeaderboardPlayer.name === p.name ? null : p)" :style="selectedLeaderboardPlayer && selectedLeaderboardPlayer.roundId === p.roundId && selectedLeaderboardPlayer.name === p.name ? {background: 'var(--gray-200)'} : {}">
                                        <td style="padding:6px;color:var(--gray-400);font-size:11px;" x-text="idx + 1"></td>
                                        <td style="padding:6px;font-weight:600;font-size:12px;" :style="{color: idx === 0 && p.holesPlayed > 0 ? 'var(--green)' : 'var(--gold-light)'}">
                                            <div x-text="p.name"></div>
                                            <div style="font-size:9px;color:var(--gray-400);font-weight:400;">
                                                <span x-text="p.course + (p.tees ? ' · ' + p.tees : '')"></span>

                            </template>

                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- BBB -->

                                </template>
                                </div>
                            </template>
                        </div>

                                </div>
                                <template x-if="isMatchupExpanded('wolf', pi)">
                                    <div style="padding:4px 0 8px 20px;">
                                        <template x-for="r in wolf.results" :key="'wr'+r.hole+pi">
                                            <div style="font-size:11px;color:var(--gray-400);padding:2px 0;">
                                                <span x-text="'H' + r.hole"></span> —
                                                <span x-show="r.wolf === pi" style="color:var(--gold-light);" x-text="r.loneWolf ? 'Lone Wolf' : 'Wolf + ' + (players[r.partner]?.name || '?')"></span>

        <template x-if="showHowToPlay">
            <div class="htp-overlay" @click.self="showHowToPlay = false">
                <div class="htp-modal">
                    <button class="htp-close" @click="showHowToPlay = false">&times;</button>
                    <div class="htp-title">How to Play</div>

                    <div class="htp-game">
                        <div class="htp-game-title">Indies (Head-to-Head)</div>
                        <p>Every player is matched against every other player in your group. You're betting individually against each opponent — your net score vs. theirs on each hole.</p>
                        <p><strong style="color:var(--gold);">Straight 18:</strong> One bet across all 18 holes. Whoever is ahead after 18 wins. No presses — what you see is what you get.</p>
                        <p><strong style="color:var(--gold);">18 Auto Press:</strong> Same as Straight 18 — one 18-hole match. But whenever a player goes 2 down, a press automatically starts. Press denomination is set separately from the match amount.</p>
                        <p><strong style="color:var(--gold);">Aloha:</strong> One bet across all 18 holes. If a player is mathematically closed out (e.g. 3 down with 2 to play), a new “aloha bet” starts for the remaining holes at half the original amount. Aloha bets can chain — if you get closed out on an aloha, another one starts at half again.</p>
                        <p><strong style="color:var(--gold);">Nassau:</strong> Three separate bets — Front 9, Back 9, and Overall 18. Each is its own match with its own denomination.</p>
                        <p><strong style="color:var(--gold);">Nassau Auto:</strong> Same as Nassau but with auto presses. Whenever a player goes 2 down on any of the three matches, a press kicks in automatically.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Team Game</div>
                        <p>Two-on-two (or two vs. one + a "pro" in 3-player rounds). Teams play 6-hole segments with new team combos each segment — so everyone partners with everyone.</p>
                        <p><strong style="color:var(--gold);">Best Ball (1 Ball):</strong> The lower net score between the two teammates counts each hole.</p>
                        <p><strong style="color:var(--gold);">Both Balls (2 Ball):</strong> Each player's net score counts individually — your team's low ball vs. their low ball, your team's high ball vs. their high ball. Think of it like a high/low match within each hole.</p>
                        <p><strong style="color:var(--gold);">Straight Six:</strong> One bet per 6-hole segment. The team ahead after the segment wins.</p>
                        <p><strong style="color:var(--gold);">Nassau:</strong> Front 3, Back 3, and Overall 6 within each segment — three separate bets per segment.</p>
                        <p><strong style="color:var(--gold);">Auto Presses:</strong> In all team formats, a press starts automatically when a team goes 2 down. In Both Balls formats, both balls are settled before a press can trigger — so if you're down 1 and lose both balls on the same hole, you jump to 3 down. The press triggered at 2 down, so you start the next hole 3 down on the original bet and even (AS) on the press. No mid-hole press starts.</p>
                        <p>The "Pro" option (3-player only) adds a phantom scratch player who shoots par every hole, giving you a full 2v2.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Points Game</div>
                        <p>Every hole, each player earns points based on where their net score ranks in the group. Ties split the combined points evenly.</p>
                        <p><strong style="color:var(--gold);">3 Players</strong> — 9 pts per hole: Win 5 / Place 3 / Show 1</p>
                        <p><strong style="color:var(--gold);">4 Players</strong> — 16 pts per hole: Win 7 / Place 5 / Show 3 / Last 1</p>
                        <p><strong style="color:var(--gold);">5 Players</strong> — 25 pts per hole: Win 9 / Place 7 / Show 5 / 4th 3 / Last 1</p>
                        <p><strong style="color:var(--gold);">Sweep:</strong> If you win a hole by 2 or more net shots, you sweep — you take ALL the points for that hole (9, 16, or 25 depending on group size). Sweeps are where the big swings happen.</p>
                        <p>After 18, each point above or below the break-even line is worth the per-point dollar amount.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Skins</div>
                        <p>Each hole is worth one skin. The player with the lowest net score on a hole wins the skin. If two or more players tie, the skin carries over to the next hole (and keeps stacking until someone wins outright).</p>
                        <p><strong style="color:var(--gold);">With Validation:</strong> If enabled, you must make net par or better on the following hole to "validate" and keep your skin. If you don't validate, the skin goes back into the pot and carries over.</p>
                        <p>Each skin won pays out from every other player in the group. So if 4 players are in at $5/skin, the winner collects $5 from each of the other 3 players ($15 total).</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Big Team</div>
                        <p>A cross-group competition. All groups on the course are split into two big teams, and the best net scores from each group count toward the team total.</p>
                        <p><strong style="color:var(--gold);">1 Best Ball:</strong> Only the lowest net score in each group counts per hole.</p>
                        <p><strong style="color:var(--gold);">2 Best Balls:</strong> The two lowest net scores in each group count per hole (one best ball in threesomes).</p>
                        <p>Scored across Front 9, Back 9, and Overall — each with its own bet amount. All groups must use the same format, amounts, <strong style="color:var(--gold);">and the same game session code</strong> at the start of the round to be matched together. You will only see other Big Teams on the leaderboard that entered the matching code.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Side Bets</div>
                        <p><strong style="color:var(--gold);">Snake 🐍:</strong> The last player to 3-putt holds the snake. Whoever is holding it at the end of the round pays every other player the bet amount.</p>
                        <p><strong style="color:var(--gold);">Closest to Pin 📍:</strong> On each par 3, the player whose tee shot finishes closest to the pin wins the pot. Everyone in the group puts in the bet amount per par 3.</p>
                        <p><strong style="color:var(--gold);">Bingo Bango Bongo 🎪:</strong> Three points available on every hole — Bingo (first on the green), Bango (closest to pin once everyone is on), Bongo (first to hole out). Each point is worth the per-point amount, paid by everyone else in the group.</p>
                        <p><strong style="color:var(--gold);">Wolf 🐺:</strong> Players rotate as the "wolf" each hole 1–16. After seeing tee shots, the wolf picks a partner — or goes lone wolf. Best ball of the team wins the hole. Lone wolf pays or collects double. The wolf always tees off first. <strong style="color:var(--gold);">Last-place rule on 17 &amp; 18:</strong> Going into hole 17, the player last in Wolf standings automatically becomes the Wolf and tees off first. If they are still last after 17, they stay the Wolf on 18. If two or more are tied for last, they decide among themselves who takes it.</p>
                    </div>

                    <div class="htp-game">
                        <div class="htp-game-title">Dots / Trash / Junk</div>
                        <p>Bonus bets for special achievements during the round. Each dot earned pays out from every other player in the group.</p>
                        <p><strong style="color:var(--gold);">Sandy:</strong> Up-and-down from a bunker (get out of the sand and make par or better).</p>
                        <p><strong style="color:var(--gold);">Greenie:</strong> Hit the green in regulation (on the green on a par 3).</p>
                        <p><strong style="color:var(--gold);">Barkie:</strong> Hit a tree during the hole and still make par or better.</p>
                        <p><strong style="color:var(--gold);">Polie:</strong> Make par, birdie, or eagle with a putt longer than the flagstick.</p>
                        <p><strong style="color:var(--gold);">Exotic:</strong> Make par or better after hitting into two sand traps during the hole (typically a fairway bunker and a greenside bunker).</p>
                        <p><strong style="color:var(--gold);">Birdie:</strong> Make birdie or better on a hole. <strong>Counts as 2 dots</strong> (all other dot types count as 1).</p>
                        <p>Each dot type can be toggled on or off, and per-player bet amounts can be customized.</p>
                    </div>

                    <div style="text-align:center; margin-top:8px;">
                        <button @click="showHowToPlay = false" style="padding:10px 32px; border-radius:10px; background:var(--green-dark); color:#fff; border:none; font-size:14px; font-weight:700; cursor:pointer;">Got It</button>
                    </div>
                </div>
            </div>
        </template>

                exportCSV(filename, headers, rows) {

                        ...rows.map(row =>
                            row.map(cell => {
                                const s = String(cell);
                                return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g, '""') + '"' : s;
                            }).join(',')
                        )
                    ].join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                },

                            nassauCount: 0,

                        };

                    this.adminData.rounds.forEach(round => {

                        round.player_names.forEach(playerName => {

                                stats[playerName] = {
                                    roundsPlayed: 0,
                                    lifetimePL: 0,
                                    nassauCount: 0,
                                    teamCount: 0,
                                    pointsCount: 0,
                                    partners: []
                                };
                            }
                            stats[playerName].roundsPlayed++;

                            // Calculate P/L from round state
                            if (round.state && round.state.pointsMoneyTotals && round.state.players) {
                                const playerIdx = round.state.players.findIndex(p =>
                                    p.name.toLowerCase() === playerName.toLowerCase()
                                );
                                if (playerIdx >= 0 && round.state.pointsMoneyTotals[playerIdx] !== undefined) {
                                    stats[playerName].lifetimePL += round.state.pointsMoneyTotals[playerIdx];
                                }
                            }

                            // Count games
                            if (round.state && round.state.games) {
                                if (round.state.games.nassau) stats[playerName].nassauCount++;
                                if (round.state.games.team) stats[playerName].teamCount++;
                                if (round.state.games.points) stats[playerName].pointsCount++;

                            // Track partners

                                }
                            });
                        });
                    });

                    // Convert partner counts to sorted arrays
                    Object.keys(stats).forEach(playerName => {
                        if (userPartners[playerName]) {
                            stats[playerName].partners = Object.entries(userPartners[playerName])
                                .map(([name, count]) => ({ name, count }))
                                .sort((a, b) => b.count - a.count)

                            bVal = this.adminData.userStats[b.user_name]?.lifetimePL || 0;

                        if (this.adminSortDir === 'asc') {
                            return aVal < bVal ? -1 : aVal > bVal ? 1 : 0;

                async spectateRound(roundId, userName) {
                    if (!sb) return;
                    this.spectatingRound = roundId;
                    try {
                        const { data, error } = await sb.from('saturday_bets_rounds')
                            .select('*').eq('id', roundId).single();
                        if (error || !data || !data.state) { alert('Could not load round'); return; }
                        this.spectatingUser = data.user_name || userName || 'Live';
                        const st = data.state;
                        // Calculate player positions from the saved state
                        // We need to reconstruct enough to compute totals
                        const positions = [];
                        for (let pi = 0; pi < st.playerCount; pi++) {
                            positions.push({ name: st.players[pi].name, amount: 0 });
                        }
                        // The state includes nassauMatchups etc., so we can read totals directly
                        // Player 0 position = total winnings from cloud
                        positions[0].amount = data.total_winnings || 0;
                        // For all players, reconstruct from nassau matchups
                        if (st.games?.nassau && st.nassauMatchups) {
                            for (const m of st.nassauMatchups) {
                                const w = (m.front9?.winnings||0)+(m.back9?.winnings||0)+(m.overall?.winnings||0)+((m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0));
                                const a = m.playerA != null ? m.playerA : 0;
                                const b = m.playerB != null ? m.playerB : (m.playerIndex || 1);
                                if (a < st.playerCount) positions[a].amount += w;
                                if (b < st.playerCount) positions[b].amount -= w;
                            }
                        }
                        if (st.games?.team && st.teamSegments) {
                            for (const seg of st.teamSegments) {
                                for (const match of (seg.matches || [])) {
                                    const inBox = seg.box.includes(0);
                                    if (!inBox && !match.teamB?.includes(0)) continue;
                                    const w = (match.combined?.winnings||0) + ((match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0));
                                    if (inBox) positions[0].amount += w;
                                    else positions[0].amount -= w;
                                }
                            }
                        }
                        if (st.games?.points && st.pointsMoneyTotals) {
                            for (let pi = 0; pi < st.playerCount; pi++) {
                                if (positions[pi]) positions[pi].amount += (st.pointsMoneyTotals[pi] || 0);
                            }
                        }
                        st._position = data.total_winnings || 0;
                        st._playerPositions = positions;
                        this.spectatingState = st;
                        this.currentScreen = 'spectating';
                    } catch(e) {
                        console.warn('Spectate failed:', e);
                        alert('Error loading round details');
                    }
                },

                async loadLeaderboard() {
                    if (!sb) return;
                    this.leaderboardLoading = true;
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        const clubId = this.club?.id;
                        const query = sb.from('saturday_bets_rounds')
                            .select('id, user_name, course, tees, status, player_names, state, updated_at, session_code')
                            .eq('date', today)
                            .or('status.eq.in_progress,status.eq.completed,status.eq.finalized');
                        if (clubId) query.eq('club_id', clubId);
                        if (this.sessionCode) query.eq('session_code', this.sessionCode);
                        const { data, error } = await query.order('updated_at', { ascending: false });
                        if (error || !data) { this.leaderboardLoading = false; return; }
                        // Extract all players from all rounds into one combined list
                        const players = [];
                        for (const round of data) {
                            if (!round.state) continue;
                            const st = round.state;
                            const holeData = st.holeData || [];
                            const coursePar = holeData.reduce((s, h) => s + (h.par || 0), 0) || 72;
                            for (let pi = 0; pi < st.playerCount; pi++) {
                                const p = st.players[pi];
                                if (!p || !p.name) continue;
                                let gross = 0, holesPlayed = 0, parForPlayed = 0, strokesReceived = 0;
                                const holeScores = [];
                                const hdcp = p.handicap || 0;
                                for (let h = 0; h < 18; h++) {
                                    const s = st.scores?.[h]?.[pi];
                                    holeScores.push(s);
                                    if (s !== null && s !== undefined) {
                                        gross += s;
                                        holesPlayed++;
                                        parForPlayed += holeData[h]?.par || 0;
                                        const holeHcp = holeData[h]?.hcp || (h + 1);
                                        // First 18 strokes: get a stroke if handicap >= hole's hcp ranking
                                        if (hdcp >= holeHcp) strokesReceived++;
                                        // Strokes beyond 18: extra stroke on hardest holes
                                        if (hdcp > 18 && (hdcp - 18) >= holeHcp) strokesReceived++;
                                    }
                                }
                                const front9 = holeScores.slice(0, 9).reduce((t, s) => s !== null && s !== undefined ? t + s : t, 0);
                                const back9 = holeScores.slice(9, 18).reduce((t, s) => s !== null && s !== undefined ? t + s : t, 0);
                                const hasFront = holeScores.slice(0, 9).some(s => s !== null && s !== undefined);
                                const hasBack = holeScores.slice(9, 18).some(s => s !== null && s !== undefined);
                                const net = holesPlayed > 0 ? gross - strokesReceived : null;
                                const netToPar = holesPlayed > 0 ? (gross - strokesReceived) - parForPlayed : null;
                                players.push({
                                    name: p.name, handicap: p.handicap || 0,
                                    gross, net, netToPar, strokesReceived, parForPlayed, holesPlayed,
                                    front9: hasFront ? front9 : null,
                                    back9: hasBack ? back9 : null,
                                    holeScores, holeData,
                                    course: round.course || st.courseName || '',
                                    tees: round.tees || st.teeName || '',
                                    roundId: round.id, scorekeeper: round.user_name,
                                    status: round.status, coursePar
                                });
                            }
                        }
                        // Sort by active sort mode (net or gross), unplayed at bottom
                        const sortKey = this.leaderboardSort === 'net' ? 'netToPar' : 'gross';
                        players.sort((a, b) => {
                            if (a.holesPlayed === 0 && b.holesPlayed === 0) return 0;
                            if (a.holesPlayed === 0) return 1;
                            if (b.holesPlayed === 0) return -1;
                            if (sortKey === 'netToPar') return (a.netToPar ?? 999) - (b.netToPar ?? 999);
                            return a.gross - b.gross;
                        });
                        this.leaderboardData = players;
                        // Preserve selected player panel across refreshes
                        if (this.selectedLeaderboardPlayer) {
                            const prev = this.selectedLeaderboardPlayer;
                            const match = players.find(p => p.roundId === prev.roundId && p.name === prev.name);
                            this.selectedLeaderboardPlayer = match || null;
                        }
                        this.leaderboardLastUpdate = new Date().toLocaleTimeString();
                        this.currentScreen = 'leaderboard';
                    } catch(e) { console.warn('Leaderboard failed:', e); }
                    this.leaderboardLoading = false;
                },

                        const seen = new Map();

                        for (const r of (allRounds || [])) {
                            const key = r.date + '|' + (r.player_names || []).sort().join(',');
                            if (!seen.has(key)) { seen.set(key, true); rounds.push(r); }
                        }
                        const me = this.loggedInUser.toLowerCase();
                        const myRounds = [];
                        const h2hMap = {};
                        const partnerMap = {};
                        let runningTotal = 0;
                        for (const r of rounds) {
                            const st = r.state || {};
                            const pls = st.players || [];
                            const pc = st.playerCount || pls.length;
                            let myIdx = -1;
                            for (let i = 0; i < pc; i++) {
                                if (pls[i]?.name?.toLowerCase() === me) { myIdx = i; break; }
                            }
                            if (myIdx === -1) continue;
                            let indiesTotal = 0, teamTotal = 0, pointsTotal = 0;
                            if (st.games?.nassau && st.nassauMatchups) {
                                for (const m of st.nassauMatchups) {
                                    const w = (m.front9?.winnings||0) + (m.back9?.winnings||0) + (m.overall?.winnings||0) + (m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                    let myNet = 0;
                                    if (m.playerA === myIdx) myNet = w;
                                    else if (m.playerB === myIdx) myNet = -w;
                                    else continue;
                                    indiesTotal += myNet;
                                    const oppIdx = m.playerA === myIdx ? m.playerB : m.playerA;
                                    const oppName = pls[oppIdx]?.name || 'Unknown';
                                    if (!h2hMap[oppName]) h2hMap[oppName] = { name: oppName, total: 0, wins: 0, losses: 0, ties: 0, rounds: [] };
                                    h2hMap[oppName].total += myNet;
                                    if (myNet > 0) h2hMap[oppName].wins++;
                                    else if (myNet < 0) h2hMap[oppName].losses++;
                                    else h2hMap[oppName].ties++;
                                    h2hMap[oppName].rounds.push({ date: r.date, net: myNet });
                                }
                            }
                            if (st.games?.points && st.pointsMoneyTotals) {
                                pointsTotal = st.pointsMoneyTotals[myIdx] || 0;
                            }
                            if (st.games?.team && st.teamSegments) {
                                for (const seg of st.teamSegments) {
                                    const inBox = seg.box?.includes(myIdx);
                                    for (const match of (seg.matches || [])) {
                                        const inOpp = match.teamB?.includes(myIdx);
                                        if (!inBox && !inOpp) continue;
                                        let mw = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                        let myTeamNet = inBox ? mw : -mw;
                                        teamTotal += myTeamNet;
                                        let partnerIdxs, oppIdxs;
                                        if (inBox) {
                                            partnerIdxs = (seg.box || []).filter(i => i !== myIdx);
                                            oppIdxs = match.teamB || [];
                                        } else {
                                            partnerIdxs = (match.teamB || []).filter(i => i !== myIdx);
                                            oppIdxs = seg.box || [];
                                        }
                                        for (const pi of partnerIdxs) {
                                            const pName = pls[pi]?.name || 'Unknown';
                                            if (!partnerMap[pName]) partnerMap[pName] = { name: pName, total: 0, wins: 0, losses: 0, ties: 0, rounds: [] };
                                            partnerMap[pName].total += myTeamNet;
                                            if (myTeamNet > 0) partnerMap[pName].wins++;
                                            else if (myTeamNet < 0) partnerMap[pName].losses++;
                                            else partnerMap[pName].ties++;
                                            partnerMap[pName].rounds.push({ date: r.date, net: myTeamNet, opponents: oppIdxs.map(i => pls[i]?.name || '?').join(' & ') });
                                        }
                                    }
                                }
                            }
                            const roundTotal = indiesTotal + teamTotal + pointsTotal;
                            runningTotal += roundTotal;
                            const playerScores = [];
                            const stScores = st.scores || [];
                            for (let pi2 = 0; pi2 < pc; pi2++) {
                                let gross = 0, hasScore = false;
                                for (let h = 0; h < 18; h++) {
                                    const sv = stScores[h]?.[pi2];
                                    if (sv !== null && sv !== undefined) { gross += sv; hasScore = true; }
                                }
                                const hdcp = pls[pi2]?.handicap || 0;
                                playerScores.push({ name: pls[pi2]?.name || 'Unknown', gross: hasScore ? gross : null, net: hasScore ? gross - hdcp : null, isMe: pi2 === myIdx });
                            }
                            myRounds.push({
                                id: r.id, date: r.date, course: r.course || st.courseName || '', tees: r.tees || st.teeName || '',
                                total: roundTotal, indiesTotal, teamTotal, pointsTotal,
                                runningTotal, players: (r.player_names || []).filter(n => n.toLowerCase() !== me),
                                playerScores
                            });
                        }
                        this.plRounds = myRounds.reverse();
                        this.plSeasonTotal = runningTotal;
                        this.plH2H = Object.values(h2hMap);
                        this.plPartners = Object.values(partnerMap);
                    } catch(e) { console.warn('P/L failed:', e); }
                    this.plLoading = false;
                },
                getFilteredH2H() {
                    let arr = [...this.plH2H];
                    const s = this.plSearch.toLowerCase().trim();
                    if (s) arr = arr.filter(o => o.name.toLowerCase().includes(s));
                    const dir = this.plSortDir === 'desc' ? -1 : 1;
                    if (this.plSort === 'total') arr.sort((a, b) => (b.total - a.total) * dir);
                    else if (this.plSort === 'winpct') arr.sort((a, b) => { const pctA = a.rounds.length ? a.wins / a.rounds.length : 0; const pctB = b.rounds.length ? b.wins / b.rounds.length : 0; return (pctB - pctA) * dir; });
                    else if (this.plSort === 'name') arr.sort((a, b) => a.name.localeCompare(b.name) * dir);
                    return arr;
                },
                getFilteredPartners() {
                    let arr = [...this.plPartners];
                    const s = this.plSearch.toLowerCase().trim();
                    if (s) arr = arr.filter(o => o.name.toLowerCase().includes(s));
                    const dir = this.plSortDir === 'desc' ? -1 : 1;
                    if (this.plSort === 'total') arr.sort((a, b) => (b.total - a.total) * dir);
                    else if (this.plSort === 'winpct') arr.sort((a, b) => { const pctA = a.rounds.length ? a.wins / a.rounds.length : 0; const pctB = b.rounds.length ? b.wins / b.rounds.length : 0; return (pctB - pctA) * dir; });
                    else if (this.plSort === 'name') arr.sort((a, b) => a.name.localeCompare(b.name) * dir);
                    return arr;
                },
                async loadLedger() {
                    if (!sb) return;
                    this.ledgerLoading = true;
                    this.currentScreen = 'ledger';
                    try {
                        const clubId = this.club?.id;
                        // Load all completed/finalized rounds for this club
                        const query = sb.from('saturday_bets_rounds')
                            .select('id, date, user_name, course, tees, status, player_names, total_winnings, state')
                            .or('status.eq.completed,status.eq.finalized')
                            .order('date', { ascending: false });
                        if (clubId) query.eq('club_id', clubId);
                        const { data: rounds, error } = await query;
                        if (error) { console.warn('Ledger load error:', error); this.ledgerLoading = false; return; }
                        // Deduplicate rounds by date + player set (keep most recently updated)
                        const seen = new Map();
                        const uniqueRounds = [];
                        for (const r of (rounds || [])) {
                            const key = r.date + '|' + (r.player_names || []).sort().join(',');
                            if (!seen.has(key)) { seen.set(key, true); uniqueRounds.push(r); }
                        }
                        // Build per-round summaries
                        this.ledgerRounds = uniqueRounds.map(r => {
                            const st = r.state || {};
                            const pt = st.playerTotals || {};
                            // Fallback: compute from state if playerTotals not present
                            if (Object.keys(pt).length === 0 && st.players) {
                                for (let i = 0; i < (st.playerCount || 0); i++) {
                                    const n = st.players[i]?.name;
                                    if (!n) continue;
                                    let t = 0;
                                    // Indies
                                    if (st.games?.nassau && st.nassauMatchups) {
                                        for (const m of st.nassauMatchups) {
                                            const w = (m.front9?.winnings||0) + (m.back9?.winnings||0) + (m.overall?.winnings||0) + (m.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                            if (m.playerA === i) t += w;
                                            else if (m.playerB === i) t -= w;
                                        }
                                    }
                                    // Points
                                    if (st.games?.points && st.pointsMoneyTotals) t += (st.pointsMoneyTotals[i] || 0);
                                    // Team (approximate from segments)
                                    if (st.games?.team && st.teamSegments) {
                                        for (const seg of st.teamSegments) {
                                            const inBox = seg.box?.includes(i);
                                            for (const match of (seg.matches || [])) {
                                                const inOpp = match.teamB?.includes(i);
                                                if (!inBox && !inOpp) continue;
                                                let mw = (match.combined?.winnings||0) + (match.front3?.winnings||0) + (match.back3?.winnings||0) + (match.presses||[]).reduce((s,p)=>s+(p.winnings||0),0);
                                                t += inBox ? mw : -mw;
                                            }
                                        }
                                    }
                                    pt[n] = t;
                                }
                            }
                            return { id: r.id, date: r.date, course: r.course || st.courseName || '', tees: r.tees || st.teeName || '', scorekeeper: r.user_name, status: r.status, playerTotals: pt, playerNames: r.player_names || [] };
                        });
                        // Compute running balances per player
                        const balMap = {};
                        for (const r of this.ledgerRounds) {
                            for (const [name, amt] of Object.entries(r.playerTotals)) {
                                balMap[name] = (balMap[name] || 0) + amt;
                            }
                        }
                        // Load payments
                        try {
                            const pq = sb.from('saturday_bets_payments').select('*').order('created_at', { ascending: false });
                            if (clubId) pq.eq('club_id', clubId);
                            const { data: payments } = await pq;
                            this.ledgerPayments = payments || [];
                            for (const p of this.ledgerPayments) {
                                balMap[p.from_player] = (balMap[p.from_player] || 0) + p.amount;
                                balMap[p.to_player] = (balMap[p.to_player] || 0) - p.amount;
                            }
                        } catch(e) { this.ledgerPayments = []; }
                        this.ledgerBalances = Object.entries(balMap).map(([name, bal]) => ({ name, balance: bal })).sort((a, b) => b.balance - a.balance);
                    } catch(e) { console.warn('Ledger failed:', e); }
                    this.ledgerLoading = false;
                },
                async recordPayment() {
                    if (!sb || !this.paymentForm.from || !this.paymentForm.to || !this.paymentForm.amount) return;
                    const amt = parseFloat(this.paymentForm.amount);
                    if (isNaN(amt) || amt <= 0) { alert('Enter a valid amount'); return; }
                    try {

                            club_id: this.club?.id,

                        });
                        if (error) { alert('Error recording payment: ' + error.message); return; }
                        this.showRecordPayment = false;
                        this.paymentForm = { from: '', to: '', amount: '', note: 'Venmo' };
                        await this.loadLedger();
                    } catch(e) { alert('Payment failed: ' + e.message); }
                },

                    // Soft-delete: set status='removed' instead of hard DELETE. Hard DELETE was silently blocked by RLS policy; local state was updated anyway, so rounds "came back" on reload.

                sortLeaderboard(mode) {
                    this.leaderboardSort = mode;
                    const sortKey = mode === 'net' ? 'netToPar' : 'gross';
                    this.leaderboardData.sort((a, b) => {
                        if (a.holesPlayed === 0 && b.holesPlayed === 0) return 0;
                        if (a.holesPlayed === 0) return 1;
                        if (b.holesPlayed === 0) return -1;
                        if (sortKey === 'netToPar') return (a.netToPar ?? 999) - (b.netToPar ?? 999);
                        return a.gross - b.gross;
                    });
                },

                saveState() { const st={playerCount:this.playerCount, players:this.players, courseName:this.courseName, teeName:this.teeName, startHole:this.startHole, games:this.games, nassauBets:this.nassauBets, nassauPressMode:this.nassauPressMode, indieFormat:this.indieFormat, indieGameType:this.indieGameType, indieSkipped:this.indieSkipped, teamGameType:this.teamGameType, teamMatchStyle:this.teamMatchStyle, teamBet:this.teamBet, teamBets:this.teamBets, teamFormat:this.teamFormat, teamBalls:this.teamBalls, teamRedistribute:this.teamRedistribute, pointsBet:this.pointsBet, pointsSweepers:this.pointsSweepers, useTeamPro:this.useTeamPro, roundStarted:this.roundStarted, scores:this.scores, holeIndex:this.holeIndex, currentScreen:this.currentScreen, nassauMatchups:this.nassauMatchups, nassauStrokes:this.nassauStrokes, teamSegments:this.teamSegments, teamStrokes:this.teamStrokes, pointsTotals:this.pointsTotals, pointsMoneyTotals:this.pointsMoneyTotals, pointsStrokes:this.pointsStrokes, holeData:this.holeData, bigTeamEnabled:this.bigTeamEnabled, bigTeamBalls:this.bigTeamBalls, bigTeamFront:this.bigTeamFront, bigTeamBack:this.bigTeamBack, bigTeamOverall:this.bigTeamOverall, skinsOpenEnabled:this.skinsOpenEnabled, skinsValidation:this.skinsValidation, skinsOpenBet:this.skinsOpenBet, skinsOpenResults:this.skinsOpenResults, snake:this.snake, ctp:this.ctp, bbb:this.bbb, dots:this.dots, wolf:this.wolf, putts:this.putts, reviewMode:this.reviewMode, lastActiveAt:Date.now(), finalizedAt:this.finalizedAt}; localStorage.setItem('saturdayBetsState', JSON.stringify(st)); },
                loadState() {
                    const s=localStorage.getItem('saturdayBetsState');
                    if(s) {
                        const st = JSON.parse(s);
                        // Backward compat: convert old array nassauBets to object
                        if (Array.isArray(st.nassauBets)) {
                            const obj = {};
                            st.nassauBets.forEach((b, i) => { obj['0-'+(i+1)] = b; });
                            st.nassauBets = obj;
                        }
                        // Backward compat: convert old single-number nassauBets values to structured objects
                        if (st.nassauBets && typeof st.nassauBets === 'object') {
                            for (const k of Object.keys(st.nassauBets)) {
                                const v = st.nassauBets[k];
                                if (typeof v === 'number') {
                                    st.nassauBets[k] = {match:v, front:v, back:v, overall:v, press:v};
                                }
                            }
                        }
                        // Backward compat: convert old nassauMatchups (playerIndex) to new (playerA/playerB)
                        if (st.nassauMatchups && st.nassauMatchups.length > 0 && st.nassauMatchups[0].playerIndex !== undefined) {
                            for (const m of st.nassauMatchups) {
                                m.playerA = 0;
                                m.playerB = m.playerIndex;
                                const bv = st.nassauBets['0-'+m.playerIndex]; m.bet = (typeof bv==='object'&&bv!==null) ? (bv.match||20) : (bv||20);
                                if (m.holes) for (const h of m.holes) { h.aNet = h.myNet || 0; h.bNet = h.theirNet || 0; }
                            }
                        }
                        // Backward compat: convert old nassauStrokes (forThem) to new (forB)
                        if (st.nassauStrokes && st.nassauStrokes.length > 0 && st.nassauStrokes[0].forThem !== undefined) {
                            for (const si of st.nassauStrokes) { si.forB = si.forThem; }
                        }
                        // Never restore admin screen from localStorage — admin access is session-only via lobby flag
                        if (st.currentScreen === 'admin') { st.currentScreen = 'setup'; }
                        Object.assign(this, st);
                        // If no round is in progress, reset setup defaults for a clean slate
                        if (!this.roundStarted) {
                            this.playerCount = 4;
                            this.players = Array.from({length: this.playerCount}, () => ({name: '', handicap: 0}));
                            this.courseName = '';
                            this.teeName = '';
                            this.holeData = buildHoleData('', '');
                            this.indieGameType = 'none';
                            this.teamGameType = 'none';
                            this.games = { nassau: false, team: false, points: false };
                            this.bigTeamEnabled = false;
                        }
                        // Backward compat: indie skipped defaults
                        if (!this.indieSkipped) this.indieSkipped = {};
                        // Backward compat: aloha removed — remap to straight6 (closest non-aloha equivalent)
                        if (st.teamMatchStyle === 'aloha') { st.teamMatchStyle = 'straight6'; }
                        // Backward compat: old teamMatchStyle values "straight18"/"straight18_auto" meant 6-hole behavior — remap to straight6/straight6_auto
                        if (st.teamMatchStyle === 'straight18' && st.teamSegments && st.teamSegments.length === 3) { st.teamMatchStyle = 'straight6'; }
                        else if (st.teamMatchStyle === 'straight18_auto' && st.teamSegments && st.teamSegments.length === 3) { st.teamMatchStyle = 'straight6_auto'; }
                        // Backward compat: team match style
                        if (!this.teamMatchStyle) {
                            if (this.teamFormat === 'nassau') this.teamMatchStyle = 'nassau_auto';

                        // Backward compat: Big Team defaults
                        if (this.bigTeamEnabled === undefined) this.bigTeamEnabled = false;
                        if (this.bigTeamBalls === undefined) this.bigTeamBalls = 2;
                        if (this.bigTeamFront === undefined) this.bigTeamFront = 10;
                        if (this.bigTeamBack === undefined) this.bigTeamBack = 10;
                        if (this.bigTeamOverall === undefined) this.bigTeamOverall = 10;
                        if (this.sessionCode === undefined) this.sessionCode = null;
                        // Backward compat: add new game type fields if missing
                        if (!this.indieFormat) this.indieFormat = 'straight';
                        if (!this.indieGameType) {
                            if (this.games.nassau) {
                                if (this.nassauPressMode === 'aloha') this.indieGameType = 'straight18_aloha';
                                else if (this.nassauPressMode === 'auto') this.indieGameType = 'straight18_auto';
                                else this.indieGameType = 'straight18';
                            } else { this.indieGameType = 'none'; }
                        }
                        if (!this.teamGameType) {
                            if (this.games.team) {
                                this.teamGameType = this.teamFormat === 'nassau' ? 'nassau_2ball_auto' : 'straight6_2ball_auto';
                            } else { this.teamGameType = 'none'; }
                        }
                        if (this.teamBalls === undefined) this.teamBalls = 2;
                        if (this.teamRedistribute === undefined) this.teamRedistribute = true;
                        if (this.pointsSweepers === undefined) this.pointsSweepers = true;
                        // Backward compat: derive teamBets from old single teamBet
                        if (!this.teamBets || typeof this.teamBets !== 'object') {
                            const b = this.teamBet || 25;
                            this.teamBets = {overall: b*2, front: b, back: b, press: b};
                        }
                        if (!this.nassauPressMode) this.nassauPressMode = 'auto';
                        // Backward compat: Side Bets defaults
                        if (this.skinsOpenEnabled === undefined) this.skinsOpenEnabled = false;
                        if (this.skinsValidation === undefined) this.skinsValidation = false;
                        if (this.skinsOpenBet === undefined) this.skinsOpenBet = 5;
                        if (!this.skinsOpenResults) this.skinsOpenResults = [];
                        if (!this.snake) this.snake = { enabled: false, bet: 5, holder: null, history: [] };
                        if (!this.ctp) this.ctp = { enabled: false, bet: 5, results: [] };
                        if (!this.bbb) this.bbb = { enabled: false, betPerPoint: 2, results: [] };
                        if (!this.dots) this.dots = { enabled: false, betPerDot: 1, types: ['sandy', 'greenie', 'barkie', 'polie', 'exotic', 'birdie'], results: [], playerConfig: [] };
                        if (!this.dots.playerConfig) this.dots.playerConfig = [];
                        if (!this.wolf) this.wolf = { enabled: false, bet: 5, results: [], lastPlaceOverride: {} };
                        if (!this.wolf.lastPlaceOverride) this.wolf.lastPlaceOverride = {};
                        if (!this.putts) this.putts = Array(18).fill(null).map(() => Array(6).fill(null));
                    }
                }
            };
